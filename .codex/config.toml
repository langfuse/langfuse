[mcp_servers.playwright]
command = "npx"
args = [
  "-y",
  "@playwright/mcp@latest",
  "--isolated",
  "--save-trace",
  "--output-dir",
  ".playwright-mcp",
  "--test-id-attribute",
  "data-testid",
]

[mcp_servers.datadog]
url = "https://mcp.datadoghq.com/api/unstable/mcp-server/mcp"

[mcp_servers.langfuse-docs]
url = "https://langfuse.com/api/mcp"

[mcp_servers.linear]
url = "https://mcp.linear.app/mcp"
