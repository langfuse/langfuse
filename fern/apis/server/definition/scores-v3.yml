# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  commons: ./commons.yml

service:
  auth: true
  base-path: /api/public
  endpoints:
    getManyV3:
      docs: |
        Get a list of scores with a polymorphic `value` field (v3).

        The `value` field type depends on `dataType`:
        - `NUMERIC` → number
        - `BOOLEAN` → boolean
        - `CATEGORICAL`, `TEXT`, `CORRECTION` → string

        Use the `fields` parameter to include optional field groups beyond the
        default `core`. Unknown group names return HTTP 400.

        This endpoint is behind the `LANGFUSE_ENABLE_SCORES_V3_API` feature flag
        and returns 404 when the flag is disabled.
      method: GET
      path: /v3/scores
      request:
        name: GetScoresV3Request
        query-parameters:
          limit:
            type: optional<integer>
            docs: Number of items per page. Maximum 100, default 50. Requests with a limit greater than 100 return HTTP 400.
          cursor:
            type: optional<string>
            docs: URL-safe base64 (base64url) cursor for pagination. Use the cursor from the previous response to get the next page. Absent on the final page.
          fields:
            type: optional<string>
            docs: >
              Comma-separated field groups to include. Allowed: core, details,
              subject, annotation. Defaults to "core". Unknown names return HTTP 400.
          id:
            type: optional<string>
            docs: Comma-separated list of score IDs to filter by (OR within, AND across filters).
          name:
            type: optional<string>
            docs: Comma-separated list of score names to filter by.
          source:
            type: optional<string>
            docs: Comma-separated list of score sources to filter by (e.g. API, ANNOTATION, EVAL).
          dataType:
            type: optional<string>
            docs: Comma-separated list of data types to filter by (NUMERIC, BOOLEAN, CATEGORICAL, TEXT, CORRECTION). Must be a single value when used with value, valueMin, or valueMax.
          environment:
            type: optional<string>
            docs: Comma-separated list of environments to filter by.
          configId:
            type: optional<string>
            docs: Comma-separated list of score config IDs to filter by.
          queueId:
            type: optional<string>
            docs: Comma-separated list of annotation queue IDs to filter by.
          authorUserId:
            type: optional<string>
            docs: Comma-separated list of author user IDs to filter by.
          value:
            type: optional<string>
            docs: >
              Comma-separated list of exact values to filter by. Requires a
              single dataType from NUMERIC, BOOLEAN, or CATEGORICAL. For
              BOOLEAN, each value must be "true" or "false". For NUMERIC, values
              are matched against the Float64 column. For CATEGORICAL, values
              are matched against string_value.
          valueMin:
            type: optional<double>
            docs: Inclusive lower bound on the numeric value. Requires dataType=NUMERIC as a single value.
          valueMax:
            type: optional<double>
            docs: Inclusive upper bound on the numeric value. Requires dataType=NUMERIC as a single value.
          traceId:
            type: optional<string>
            docs: Comma-separated list of trace IDs to filter by. Mutually exclusive with sessionId, observationId, experimentId.
          sessionId:
            type: optional<string>
            docs: Comma-separated list of session IDs to filter by. Mutually exclusive with traceId, observationId, experimentId.
          observationId:
            type: optional<string>
            docs: Comma-separated list of observation IDs to filter by. Mutually exclusive with traceId, sessionId, experimentId.
          experimentId:
            type: optional<string>
            docs: Comma-separated list of dataset run IDs (experiment IDs) to filter by. Mutually exclusive with traceId, sessionId, observationId.
          fromTimestamp:
            type: optional<datetime>
            docs: Inclusive lower bound on the score timestamp.
          toTimestamp:
            type: optional<datetime>
            docs: Exclusive upper bound on the score timestamp.
      response: GetScoresV3Response

types:
  ScoreDetailsV3:
    docs: Returned when fields includes "details".
    properties:
      comment:
        type: nullable<string>
        docs: Optional comment attached to the score.
      configId:
        type: nullable<string>
        docs: The score config ID, if this score was created from a config.
      metadata:
        type: map<string, unknown>
        docs: Arbitrary metadata attached to the score.

  ScoreSubjectKindV3:
    enum:
      - trace
      - observation
      - session
      - experiment

  ScoreSubjectV3:
    docs: Returned when fields includes "subject".
    properties:
      kind: ScoreSubjectKindV3
      id:
        type: string
        docs: The entity-specific ID (traceId, observationId, sessionId, or datasetRunId depending on kind).
      traceId:
        type: optional<string>
        docs: The parent trace ID. Present only when kind is "observation".

  ScoreAnnotationV3:
    docs: Returned when fields includes "annotation".
    properties:
      authorUserId:
        type: nullable<string>
        docs: The user who created this score. Non-null only for source=ANNOTATION.
      queueId:
        type: nullable<string>
        docs: The annotation queue this score belongs to, if any.

  BaseScoreV3:
    properties:
      id: string
      projectId: string
      name: string
      source: commons.ScoreSource
      timestamp: datetime
      environment:
        type: string
        docs: The environment from which this score originated.
      createdAt: datetime
      updatedAt: datetime
      details:
        type: optional<ScoreDetailsV3>
        docs: Present when "details" is included in the fields parameter.
      subject:
        type: optional<ScoreSubjectV3>
        docs: Present when "subject" is included in the fields parameter.
      annotation:
        type: optional<ScoreAnnotationV3>
        docs: Present when "annotation" is included in the fields parameter.

  NumericScoreV3:
    extends: BaseScoreV3
    properties:
      value:
        type: double
        docs: The numeric value of the score.

  BooleanScoreV3:
    extends: BaseScoreV3
    properties:
      value:
        type: boolean
        docs: The boolean value of the score.

  CategoricalScoreV3:
    extends: BaseScoreV3
    properties:
      value:
        type: string
        docs: The string category value of the score.

  TextScoreV3:
    extends: BaseScoreV3
    properties:
      value:
        type: string
        docs: The text content of the score.

  CorrectionScoreV3:
    extends: BaseScoreV3
    properties:
      value:
        type: string
        docs: The correction content of the score. Empty string if not set.

  ScoreV3:
    discriminant: dataType
    union:
      NUMERIC:
        type: NumericScoreV3
        docs: Score with NUMERIC data type. Value is a number.
      BOOLEAN:
        type: BooleanScoreV3
        docs: Score with BOOLEAN data type. Value is a boolean.
      CATEGORICAL:
        type: CategoricalScoreV3
        docs: Score with CATEGORICAL data type. Value is a string category.
      TEXT:
        type: TextScoreV3
        docs: Score with TEXT data type. Value is a string.
      CORRECTION:
        type: CorrectionScoreV3
        docs: Score with CORRECTION data type. Value is the correction string.

  GetScoresV3Meta:
    properties:
      limit: integer
      cursor:
        type: optional<string>
        docs: URL-safe base64 (base64url) cursor for the next page. Absent when there are no more results.

  GetScoresV3Response:
    properties:
      data: list<ScoreV3>
      meta: GetScoresV3Meta
