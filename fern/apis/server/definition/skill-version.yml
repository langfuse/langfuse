# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  skills: ./skills.yml
  pagination: ./utils/pagination.yml
service:
  auth: true
  base-path: /api/public/v2
  endpoints:
    update:
      docs: Update labels for a specific skill version
      method: PATCH
      path: /skills/{name}/versions/{version}
      path-parameters:
        name:
          type: string
          docs: |
            The name of the skill. If the skill is in a folder (e.g., "folder/subfolder/skill-name"),
            the folder path must be URL encoded.
        version:
          type: integer
          docs: Version of the skill to update
      request:
        name: UpdateSkillRequest
        body:
          properties:
            newLabels:
              type: list<string>
              docs: New labels for the skill version. Labels are unique across versions. The "latest" label is reserved and managed by Langfuse.
      response: skills.Skill
