# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  commons: ./commons.yml

service:
  auth: true
  base-path: /api/public/integrations/blob-storage
  endpoints:
    getBlobStorageIntegrations:
      docs: Get all blob storage integrations for the organization (requires organization-scoped API key)
      method: GET
      path: ""
      response: BlobStorageIntegrationsResponse

    upsertBlobStorageIntegration:
      docs: Create or update a blob storage integration for a specific project (requires organization-scoped API key). The configuration is validated by performing a test upload to the bucket.
      method: PUT
      path: ""
      request: CreateBlobStorageIntegrationRequest
      response: BlobStorageIntegrationResponse

    getBlobStorageIntegrationStatus:
      docs: Get the sync status of a blob storage integration by integration ID (requires organization-scoped API key)
      method: GET
      path: "/{id}"
      path-parameters:
        id: string
      response: BlobStorageIntegrationStatusResponse

    deleteBlobStorageIntegration:
      docs: Delete a blob storage integration by ID (requires organization-scoped API key)
      method: DELETE
      path: "/{id}"
      path-parameters:
        id: string
      response: BlobStorageIntegrationDeletionResponse

types:
  BlobStorageIntegrationType:
    enum:
      - S3
      - S3_COMPATIBLE
      - AZURE_BLOB_STORAGE

  BlobStorageIntegrationFileType:
    enum:
      - JSON
      - CSV
      - JSONL

  BlobStorageExportMode:
    enum:
      - FULL_HISTORY
      - FROM_TODAY
      - FROM_CUSTOM_DATE

  BlobStorageExportFrequency:
    enum:
      - every_20_minutes
      - hourly
      - daily
      - weekly

  BlobStorageExportSource:
    docs: |
      What data the integration exports.
      - `LEGACY_TRACES_OBSERVATIONS`: traces, observations, and scores tables with a fixed column set. The `exportFieldGroups` field is not applicable.
      - `OBSERVATIONS_V2`: same data model as the `/api/public/v2/observations` endpoint, plus scores. Columns are controlled by `exportFieldGroups`.
      - `LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS`: both sets. For the `OBSERVATIONS_V2` portion, columns are controlled by `exportFieldGroups`.

      **Note:** `OBSERVATIONS_V2` and the enriched-observations portion of `LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS` rely on the enriched observations table (Langfuse Fast Preview / v4), which is currently available on Langfuse Cloud only. See https://langfuse.com/docs/v4.
    enum:
      - LEGACY_TRACES_OBSERVATIONS
      - OBSERVATIONS_V2
      - LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS

  BlobStorageExportFieldGroup:
    docs: Field group for the OBSERVATIONS_V2 and LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS export.
    enum:
      - core
      - basic
      - time
      - io
      - metadata
      - model
      - usage
      - prompt
      - metrics
      - tools
      - trace_context

  CreateBlobStorageIntegrationRequest:
    properties:
      projectId:
        type: string
        docs: ID of the project in which to configure the blob storage integration
      type: BlobStorageIntegrationType
      bucketName:
        type: string
        docs: Name of the storage bucket. For AZURE_BLOB_STORAGE, must be a valid Azure container name (3-63 chars, lowercase letters, numbers, and hyphens only, must start and end with a letter or number, no consecutive hyphens).
      endpoint:
        type: optional<string>
        docs: Custom endpoint URL (required for S3_COMPATIBLE type)
      region:
        type: string
        docs: Storage region
      accessKeyId:
        type: optional<string>
        docs: Access key ID for authentication
      secretAccessKey:
        type: optional<string>
        docs: Secret access key for authentication (will be encrypted when stored)
      prefix:
        type: optional<string>
        docs: Path prefix for exported files (must end with forward slash if provided)
      exportFrequency: BlobStorageExportFrequency
      enabled:
        type: boolean
        docs: Whether the integration is active
      forcePathStyle:
        type: boolean
        docs: Use path-style URLs for S3 requests
      fileType: BlobStorageIntegrationFileType
      exportMode: BlobStorageExportMode
      exportStartDate:
        type: optional<datetime>
        docs: Custom start date for exports (required when exportMode is FROM_CUSTOM_DATE)
      compressed:
        type: optional<boolean>
        docs: Enable gzip compression for exported files (.csv.gz, .json.gz, .jsonl.gz). Defaults to true.
      exportSource:
        type: optional<BlobStorageExportSource>
        docs: |
          Data to export. When omitted on update, the existing value is preserved. When omitted on create: pre-cutoff Cloud projects and self-hosted deployments fall back to `LEGACY_TRACES_OBSERVATIONS`; post-cutoff Cloud projects (created on or after 2026-05-20) auto-default to `OBSERVATIONS_V2`. Required when `exportFieldGroups` is provided.

          **Cloud-only deprecation gate (effective 2026-05-20):** For projects created on or after 2026-05-20 on Langfuse Cloud, `LEGACY_TRACES_OBSERVATIONS` and `LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS` are rejected with HTTP 400. Omitting `exportSource` on these projects silently defaults to `OBSERVATIONS_V2` rather than the schema column default. Use `OBSERVATIONS_V2` for all new integrations. Projects created before 2026-05-20 and self-hosted deployments are unaffected.

      exportFieldGroups:
        type: optional<list<BlobStorageExportFieldGroup>>
        docs: |
          Field groups to include in each exported row.

          For exportSource `OBSERVATIONS_V2` or `LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS`: must include `core` if provided. When omitted on create, the column default (all groups) applies. When omitted on update, the existing value is preserved.

          For exportSource `LEGACY_TRACES_OBSERVATIONS`: this field must be omitted or null. Sending an array (including an empty array) returns 400, because that source uses a fixed column set and does not honor field groups.

          `exportFieldGroups` requires `exportSource` to be provided in the same request.

  BlobStorageIntegrationResponse:
    properties:
      id: string
      projectId: string
      type: BlobStorageIntegrationType
      bucketName: string
      endpoint: nullable<string>
      region: string
      accessKeyId: nullable<string>
      prefix: string
      exportFrequency: BlobStorageExportFrequency
      enabled: boolean
      forcePathStyle: boolean
      fileType: BlobStorageIntegrationFileType
      exportMode: BlobStorageExportMode
      exportStartDate: nullable<datetime>
      compressed: boolean
      exportSource: BlobStorageExportSource
      exportFieldGroups:
        type: nullable<list<BlobStorageExportFieldGroup>>
        docs: |
          Field groups included in each exported row for `OBSERVATIONS_V2` / `LEGACY_TRACES_AND_ENRICHED_OBSERVATIONS` sources. Always `null` when exportSource is `LEGACY_TRACES_OBSERVATIONS` (the field does not apply to that source; any legacy DB value is hidden from the public surface).
      nextSyncAt: nullable<datetime>
      lastSyncAt: nullable<datetime>
      lastError: nullable<string>
      lastErrorAt: nullable<datetime>
      createdAt: datetime
      updatedAt: datetime

  BlobStorageIntegrationsResponse:
    properties:
      data: list<BlobStorageIntegrationResponse>

  BlobStorageSyncStatus:
    docs: |
      Sync status of the blob storage integration:
      - `disabled` â€” integration is not enabled
      - `error` â€” last export failed (see `lastError` for details)
      - `idle` â€” enabled but has never exported yet
      - `queued` â€” next export is overdue (`nextSyncAt` is in the past) and waiting to be picked up by the worker
      - `up_to_date` â€” all available data has been exported; next export is scheduled for the future

      **ETL usage**: poll this endpoint and check for `up_to_date` status. Compare `lastSyncAt` against your
      ETL bookmark to determine if new data is available. Note that exports run with a 20-minute lag buffer,
      so `lastSyncAt` will always be at least 20 minutes behind real-time.
    enum:
      - idle
      - queued
      - up_to_date
      - disabled
      - error

  BlobStorageIntegrationStatusResponse:
    properties:
      id: string
      projectId: string
      syncStatus: BlobStorageSyncStatus
      enabled: boolean
      lastSyncAt:
        type: nullable<datetime>
        docs: End of the last successfully exported time window. Compare against your ETL bookmark to determine if new data is available. Null if the integration has never synced.
      nextSyncAt:
        type: nullable<datetime>
        docs: When the next export is scheduled. Null if no sync has occurred yet.
      lastError:
        type: nullable<string>
        docs: Raw error message from the storage provider (S3/Azure/GCS) if the last export failed. Cleared on successful export.
      lastErrorAt:
        type: nullable<datetime>
        docs: When the last error occurred. Cleared on successful export.

  BlobStorageIntegrationDeletionResponse:
    properties:
      message: string
