# yaml-language-server: $schema=https://raw.githubusercontent.com/fern-api/fern/main/fern.schema.json
imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
service:
  auth: true
  base-path: /api/public
  endpoints:
    list:
      method: GET
      docs: Get all datasets
      path: /v2/datasets
      request:
        name: GetDatasetsRequest
        query-parameters:
          page:
            type: optional<integer>
            docs: page number, starts at 1
          limit:
            type: optional<integer>
            docs: limit of items per page
      response: PaginatedDatasets
    get:
      method: GET
      docs: Get a dataset
      path: /v2/datasets/{datasetName}
      path-parameters:
        datasetName: string
      response: commons.Dataset
    get-runs-by-id:
      method: GET
      docs: Get dataset runs by dataset ID. Use this v2 route when dataset names may contain `/`.
      path: /v2/datasets/by-id/{datasetId}/runs
      path-parameters:
        datasetId: string
      request:
        name: GetDatasetRunsByIdRequest
        query-parameters:
          page:
            type: optional<integer>
            docs: page number, starts at 1
          limit:
            type: optional<integer>
            docs: limit of items per page
      response: PaginatedDatasetRuns
    get-run-by-id:
      method: GET
      docs: Get a dataset run and its items by dataset ID and run ID. Use this v2 route when dataset names may contain `/`.
      path: /v2/datasets/by-id/{datasetId}/runs/{runId}
      path-parameters:
        datasetId: string
        runId: string
      response: commons.DatasetRunWithItems
    delete-run-by-id:
      method: DELETE
      docs: Delete a dataset run and all its run items by dataset ID and run ID. Use this v2 route when dataset names may contain `/`.
      path: /v2/datasets/by-id/{datasetId}/runs/{runId}
      path-parameters:
        datasetId: string
        runId: string
      response: DeleteDatasetRunResponse
    create:
      method: POST
      docs: Create a dataset
      path: /v2/datasets
      request: CreateDatasetRequest
      response: commons.Dataset
    getRun:
      method: GET
      docs: Get a dataset run and its items. Kept for backward compatibility; prefer the v2 ID-based route when dataset names may contain `/`.
      path: /datasets/{datasetName}/runs/{runName}
      path-parameters:
        datasetName: string
        runName: string
      response: commons.DatasetRunWithItems
    deleteRun:
      method: DELETE
      docs: Delete a dataset run and all its run items. This action is irreversible. Kept for backward compatibility; prefer the v2 ID-based route when dataset names may contain `/`.
      path: /datasets/{datasetName}/runs/{runName}
      path-parameters:
        datasetName: string
        runName: string
      response: DeleteDatasetRunResponse
    getRuns:
      method: GET
      docs: Get dataset runs. Kept for backward compatibility; prefer the v2 ID-based route when dataset names may contain `/`.
      path: /datasets/{datasetName}/runs
      path-parameters:
        datasetName: string
      request:
        name: GetDatasetRunsRequest
        query-parameters:
          page:
            type: optional<integer>
            docs: page number, starts at 1
          limit:
            type: optional<integer>
            docs: limit of items per page
      response: PaginatedDatasetRuns

types:
  PaginatedDatasets:
    properties:
      data: list<commons.Dataset>
      meta: pagination.MetaResponse
  CreateDatasetRequest:
    properties:
      name: string
      description: optional<string>
      metadata: optional<unknown>
      inputSchema:
        type: optional<unknown>
        docs: JSON Schema for validating dataset item inputs. When set, all new and existing dataset items will be validated against this schema.
      expectedOutputSchema:
        type: optional<unknown>
        docs: JSON Schema for validating dataset item expected outputs. When set, all new and existing dataset items will be validated against this schema.
  PaginatedDatasetRuns:
    properties:
      data: list<commons.DatasetRun>
      meta: pagination.MetaResponse
  GetDatasetRunsByIdRequest:
    properties:
      page:
        type: optional<integer>
        docs: page number, starts at 1
      limit:
        type: optional<integer>
        docs: limit of items per page
  DeleteDatasetRunResponse:
    properties:
      message: string
