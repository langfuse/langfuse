types:
  PublicApiError:
    docs: >
      Standard error envelope for the unstable evaluators API.


      Response handling guidance:

      - Use the HTTP status code for the broad class of failure.

      - Use `code` for precise branching in SDKs, CLIs, or agents.

      - Inspect `details` for field-level validation context such as invalid
      filter values, malformed JSONPath expressions, or missing variable
      mappings.

      - Retry only after fixing the specific issue described by `code` and
      `details`.
    examples:
      - name: InvalidFilterValue
        value:
          code: invalid_filter_value
          details:
            allowedValues:
              - GENERATION
              - SPAN
              - EVENT
            column: type
            field: filter[0].value
            invalidValues:
              - INVALID
          message: 'Filter column "type" contains unsupported value(s): INVALID'
      - name: InvalidExperimentDatasetFilterValue
        value:
          code: invalid_filter_value
          details:
            column: datasetId
            field: filter[0].value
            invalidValues:
              - dataset-prod
          message: >-
            Filter column "datasetId" contains dataset id(s) that do not exist
            in this project: dataset-prod
      - name: EvaluatorPreflightFailed
        value:
          code: evaluator_preflight_failed
          details:
            evaluatorName: answer-correctness
            model: null
            provider: null
          message: >-
            No valid LLM model found for evaluator "answer-correctness". No
            default model or custom model configured for project project_123
      - name: MissingVariableMapping
        value:
          code: missing_variable_mapping
          details:
            field: mapping
            variables:
              - output
          message: 'Missing mappings for evaluator variable(s): output'
      - name: InvalidJsonPath
        value:
          code: invalid_json_path
          details:
            field: mapping[0].jsonPath
            value: $[
            variable: customer_tier
          message: >-
            Mapping for variable "customer_tier" has an invalid jsonPath "$[".
            JSONPath expressions must use balanced quotes, brackets, and
            parentheses.
      - name: NameConflict
        value:
          code: name_conflict
          details:
            field: name
          message: >-
            An evaluation rule named "answer-quality-live" already exists in
            this project. Use PATCH
            /api/public/unstable/evaluation-rules/erule_123 to update it instead
            of creating a duplicate.
      - name: ActiveEvaluationRuleLimit
        value:
          code: conflict
          details:
            limit: 50
          message: >-
            This project already has the maximum number of active evaluation
            rules (50). Disable an existing active evaluation rule before
            enabling another one.
      - name: RateLimited
        value:
          code: rate_limited
          details:
            limit: 1000
            remaining: 0
            resetAt: '2026-03-30T10:00:00.000Z'
            retryAfterSeconds: 60
          message: Rate limit exceeded
    properties:
      code:
        docs: Stable machine-readable error code.
        type: PublicApiErrorCode
      details:
        docs: >-
          Optional structured error context. Inspect the populated fields based
          on `code`.
        type: optional<PublicApiErrorDetails>
      message:
        docs: Human-readable description of the failure.
        type: string
  PublicApiErrorCode:
    docs: >
      Machine-readable error code returned by the unstable evaluators API.


      SDKs, CLIs, and agents should branch on `code` rather than parsing the
      human-readable `message`.

      The HTTP status still indicates the broad error class, while `code` gives
      the specific failure reason.
    enum:
      - authentication_failed
      - access_denied
      - invalid_request
      - invalid_query
      - invalid_body
      - invalid_filter_value
      - invalid_json_path
      - invalid_variable_mapping
      - missing_variable_mapping
      - duplicate_variable_mapping
      - resource_not_found
      - name_conflict
      - evaluator_preflight_failed
      - conflict
      - unprocessable_content
      - rate_limited
      - method_not_allowed
      - internal_error
  PublicApiErrorDetails:
    docs: >
      Optional structured context attached to an unstable-evals error.


      The populated fields depend on the error `code`:

      - request parsing failures populate `issues`

      - filter validation failures populate `field`, `column`, `invalidValues`,
      and `allowedValues`

      - variable mapping failures populate `field`, `variable`, or `variables`

      - JSONPath validation failures populate `field`, `variable`, and `value`

      - evaluator preflight failures populate `evaluatorName`, `provider`, and
      `model`

      - rate limiting populates `retryAfterSeconds`, `limit`, `remaining`, and
      `resetAt`
    properties:
      allowedValues:
        docs: Allowed values for the failing filter column.
        type: optional<list<string>>
      column:
        docs: Filter column that failed validation.
        type: optional<string>
      evaluatorName:
        docs: Evaluator name used during preflight validation.
        type: optional<string>
      field:
        docs: >-
          Path-like reference to the failing field, for example
          `mapping[1].jsonPath`.
        type: optional<string>
      invalidValues:
        docs: Unsupported values supplied by the caller.
        type: optional<list<string>>
      issues:
        docs: Validation issues for malformed request bodies or query parameters.
        type: optional<list<PublicApiValidationIssue>>
      limit:
        docs: >-
          Numeric limit associated with the failure, for example the active
          evaluation-rule cap or the current rate-limit window.
        type: optional<integer>
      model:
        docs: Model resolved during evaluator preflight, if any.
        type: optional<nullable<string>>
      provider:
        docs: Provider resolved during evaluator preflight, if any.
        type: optional<nullable<string>>
      remaining:
        docs: Remaining requests in the current rate-limit window.
        type: optional<integer>
      resetAt:
        docs: ISO-8601 timestamp when the current rate-limit window resets.
        type: optional<string>
      retryAfterSeconds:
        docs: Suggested retry delay for rate-limited requests.
        type: optional<integer>
      value:
        docs: Raw invalid value supplied by the caller.
        type: optional<string>
      variable:
        docs: Evaluator variable involved in the failure.
        type: optional<string>
      variables:
        docs: >-
          Multiple evaluator variables involved in the failure, for example
          missing mappings.
        type: optional<list<string>>
  PublicApiValidationIssue:
    docs: >
      One validation issue returned for malformed request bodies or query
      parameters.


      This mirrors the most important parts of a Zod issue: a machine-readable
      `code`,

      a human-readable `message`, and a structured `path`.
    properties:
      code:
        docs: >-
          Machine-readable validation issue code emitted by the server
          validator.
        type: string
      message:
        docs: Human-readable explanation of the validation failure.
        type: string
      path:
        docs: Path to the invalid field, for example `["mapping", 0, "jsonPath"]`.
        type: list<unknown>
errors:
  AccessDeniedError:
    docs: >
      Authenticated, but the caller is not allowed to access the requested
      resource.


      Typical unstable-eval examples:

      - using an organization-scoped key against project-scoped evaluator
      endpoints

      - using a valid key that lacks the required access level for this resource
    status-code: 403
    type: PublicApiError
  BadRequestError:
    docs: >
      Request parsing or validation failed.


      Typical unstable-eval examples:

      - malformed request body or query parameters

      - unsupported filter value

      - invalid JSONPath selector

      - missing or duplicate variable mappings


      Recovery guidance:

      - read `details.issues` for malformed bodies or queries

      - read `details.column`, `details.invalidValues`, and
      `details.allowedValues` for filter problems

      - for `details.column=datasetId`, call `GET /api/public/v2/datasets` and
      retry with dataset `id` values from that response

      - read `details.variable` or `details.variables` for mapping problems
    status-code: 400
    type: PublicApiError
  ConflictError:
    docs: >
      The request conflicts with existing state.


      Typical unstable-eval examples:

      - evaluator version changed during concurrent creation

      - an evaluation rule name already exists in the project, so the caller
      should PATCH the existing resource instead

      - enabling another evaluation rule would exceed the project limit of 50
      active evaluation rules

      - the underlying state changed between read and write operations, so the
      client should retry


      Recovery guidance:

      - for `name_conflict`, PATCH the existing evaluation rule instead of
      creating another one

      - for the active-limit conflict, disable another active evaluation rule
      before enabling a new one
    status-code: 409
    type: PublicApiError
  InternalServerError:
    docs: An unexpected server-side error occurred.
    status-code: 500
    type: PublicApiError
  MethodNotAllowedError:
    docs: The HTTP method is not supported for this endpoint.
    status-code: 405
    type: PublicApiError
  NotFoundError:
    docs: >-
      The requested evaluator or evaluation rule does not exist within the
      authorized project.
    status-code: 404
    type: PublicApiError
  TooManyRequestsError:
    docs: >-
      The project is rate limited. Retry after the interval described in the
      response headers and error details.
    status-code: 429
    type: PublicApiError
  UnauthorizedError:
    docs: |
      Authentication failed.

      Typical unstable-eval examples:
      - the API key or secret key is invalid
      - the request uses the wrong host or stale credentials
    status-code: 401
    type: PublicApiError
  UnprocessableContentError:
    docs: >
      The request is syntactically valid, but Langfuse cannot accept it in its
      current form.


      The most important unstable-eval case is
      `code=evaluator_preflight_failed`, which means the evaluator cannot
      currently run with the resolved model configuration.


      Recovery guidance:

      - configure the project's default evaluation model, or send a valid
      explicit evaluator `modelConfig`

      - once the model configuration is valid, retry the same request
    status-code: 422
    type: PublicApiError
