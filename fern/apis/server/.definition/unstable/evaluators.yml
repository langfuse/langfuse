imports:
  commons: ./commons.yml
  errors: ./errors.yml
  pagination: ../utils/pagination.yml
types:
  CodeEvaluator:
    extends: EvaluatorBase
    properties:
      sourceCode:
        docs: Source code executed for each matched observation.
        type: string
      sourceCodeLanguage:
        docs: Runtime language for `sourceCode`.
        type: commons.CodeEvaluatorSourceCodeLanguage
  CreateCodeEvaluatorRequest:
    properties:
      name:
        docs: Evaluator name within the authenticated project.
        type: string
      sourceCode:
        docs: Code executed for each matched observation.
        type: string
      sourceCodeLanguage:
        docs: Runtime language for `sourceCode`.
        type: commons.CodeEvaluatorSourceCodeLanguage
  CreateEvaluatorRequest:
    discriminant: type
    docs: >
      Request body for creating an evaluator.


      If the same `name` already exists in your project, Langfuse creates the
      next version and returns it.

      Existing evaluation rules in the same project are then moved to that new
      latest version automatically.

      If `type` is omitted, Langfuse defaults it to `llm_as_judge` for backwards
      compatibility.
    union:
      code:
        type: CreateCodeEvaluatorRequest
      llm_as_judge:
        type: CreateLlmAsJudgeEvaluatorRequest
  CreateLlmAsJudgeEvaluatorRequest:
    properties:
      modelConfig:
        docs: >-
          Optional explicit model configuration. Omit or set to `null` to use
          the project default evaluation model.
        type: optional<nullable<commons.EvaluatorModelConfig>>
      name:
        docs: Evaluator name within the authenticated project.
        type: string
      outputDefinition:
        docs: >
          Structured output schema the evaluator must return.


          Always send `dataType`.

          Do not send `version`; it is an internal storage detail and not part
          of the public request contract.
        type: commons.EvaluatorOutputDefinition
      prompt:
        docs: Prompt template used by the evaluator.
        type: string
  DeleteEvaluatorResponse:
    docs: Confirmation response returned after successful deletion.
    properties:
      message:
        docs: Always `Evaluator successfully deleted`.
        type: string
  Evaluator:
    discriminant: type
    docs: >
      One evaluator that can be used for scoring.


      An evaluator describes **how** to score data.


      It does not define **which** live objects are evaluated. That is the job
      of `evaluation-rules`.


      For agent clients, the most important fields are:

      - `type`: determines which evaluator fields are present

      - `variables`: for LLM evaluators, use these exact names when building the
      evaluation-rule `mapping` array. LLM evaluators require every variable to
      be mapped. Code evaluators always expose the fixed runtime payload fields
      and Langfuse maps them automatically.


      Versioning behavior:

      - `GET /evaluators` returns the latest version of each available
      evaluator.

      - `GET /evaluators/{id}` can return an older version.

      - Evaluation rules always run against the latest version for the selected
      evaluator name within the same source (`project` or `managed`).
    union:
      code:
        type: CodeEvaluator
      llm_as_judge:
        type: LlmAsJudgeEvaluator
  EvaluatorBase:
    properties:
      createdAt:
        docs: Timestamp when this evaluator was created.
        type: datetime
      evaluationRuleCount:
        docs: >-
          Number of evaluation rules in the project that currently use this
          evaluator version.
        type: integer
      id:
        docs: Identifier of this evaluator.
        type: string
      name:
        docs: Evaluator name.
        type: string
      scope:
        docs: >-
          Where this evaluator comes from: your project or Langfuse-managed
          defaults.
        type: commons.EvaluatorScope
      updatedAt:
        docs: Timestamp when this evaluator was last updated.
        type: datetime
      variables:
        docs: >
          Variables that can be mapped when creating an evaluation rule.


          LLM evaluators require every variable to be mapped exactly once. Code
          evaluators always expose the fixed runtime payload fields and Langfuse
          maps them automatically.
        type: list<string>
      version:
        docs: Version number of this evaluator.
        type: integer
  Evaluators:
    properties:
      data:
        type: list<Evaluator>
      meta:
        type: pagination.MetaResponse
  LlmAsJudgeEvaluator:
    extends: EvaluatorBase
    properties:
      modelConfig:
        docs: >-
          Explicit model configuration, or `null` when the project default
          evaluation model is used.
        type: nullable<commons.EvaluatorModelConfig>
      outputDefinition:
        docs: >
          Structured output schema returned by this evaluator.


          Responses always include `dataType` and omit the internal
          output-definition `version`.

          Use `dataType` to decide how future scores should be interpreted.
        type: commons.PublicEvaluatorOutputDefinition
      prompt:
        docs: Prompt template used during evaluation.
        type: string
service:
  auth: true
  base-path: /api/public/unstable
  endpoints:
    create:
      docs: >
        Create an evaluator in the authenticated project.


        Use evaluators to define **how** Langfuse should score data.

        LLM-as-a-judge evaluators define a prompt, expected structured output,
        and optional model configuration.

        Code evaluators define source code and a runtime language.


        Naming behavior:

        - If this is a new evaluator name in your project, Langfuse creates
        version `1`.

        - If the name already exists in your project, Langfuse creates the next
        version and returns it.

        - When a new project version is created, existing evaluation rules in
        that project automatically move to the newest version for that evaluator
        name.


        Recommended workflow:

        1. Create the evaluator.

        2. Read the returned `variables` array.

        3. Read the returned `outputDefinition.dataType` so the client knows
        whether future scores will be numeric, boolean, or categorical.

        4. Create one or more evaluation rules that reference the returned
        evaluator family using `name` and `scope`.


        Code evaluator validation:

        - At creation, Langfuse only validates the request shape

        - The `sourceCode` itself is not executed here. It is first run
        (preflight-tested against a sample observation) when you link the
        evaluator to an evaluation rule, so runtime errors in the code surface
        at evaluation-rule creation, not at evaluator creation.


        Recovery guidance:

        - `422` with `code=evaluator_preflight_failed`: the evaluator cannot run
        with the resolved model configuration. Add a valid explicit
        `modelConfig`, or configure the project's default evaluation model, then
        retry the same request.

        - `400` with `code=invalid_body`: the request shape is malformed. Use
        the structured `details.issues` array to fix the specific fields and
        retry.

        - `400` with `code=invalid_body` on `outputDefinition`: for
        `type=llm_as_judge`, send `dataType`, `reasoning.description`, and
        `score.description`. Do not send `version`; it is not part of the public
        request shape.

        - If `type` is omitted, Langfuse treats the request as
        `type=llm_as_judge` for backwards compatibility. New clients should send
        `type` explicitly.


        Unstable API note:

        - This surface may evolve while the underlying evaluation data model is
        being redesigned.
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.MethodNotAllowedError
        - errors.ConflictError
        - errors.UnprocessableContentError
        - errors.TooManyRequestsError
        - errors.InternalServerError
      examples:
        - docs: Create a new version of an evaluator named `answer-correctness`.
          name: CreateEvaluatorVersion
          request:
            modelConfig:
              model: gpt-4.1-mini
              provider: openai
            name: answer-correctness
            outputDefinition:
              dataType: NUMERIC
              reasoning:
                description: Explain why the score was assigned.
              score:
                description: Correctness score between 0 and 1.
            prompt: |
              You are grading an answer.

              Input:
              {{input}}

              Output:
              {{output}}

              Return a score between 0 and 1.
            type: llm_as_judge
          response:
            body:
              createdAt: '2026-03-30T09:00:00.000Z'
              evaluationRuleCount: 0
              id: evaltmpl_123
              modelConfig:
                model: gpt-4.1-mini
                provider: openai
              name: answer-correctness
              outputDefinition:
                dataType: NUMERIC
                reasoning:
                  description: Explain why the score was assigned.
                score:
                  description: Correctness score between 0 and 1.
              prompt: |
                You are grading an answer.

                Input:
                {{input}}

                Output:
                {{output}}

                Return a score between 0 and 1.
              scope: project
              type: llm_as_judge
              updatedAt: '2026-03-30T09:00:00.000Z'
              variables:
                - input
                - output
              version: 2
        - docs: >
            Create a TypeScript code evaluator named `exact-match`.


            Send only the `evaluate` function; Langfuse injects the
            `EvaluationContext`,

            `EvaluationResult`, and `Score` type definitions at runtime.

            Code evaluators always expose the fixed runtime payload variables
            and do not take a `mapping`.
          name: CreateTypeScriptCodeEvaluator
          request:
            name: exact-match
            sourceCode: |
              function evaluate(ctx: EvaluationContext): EvaluationResult {
                const input = ctx.observation.input;
                const matchesOutput =
                  input !== undefined && ctx.observation.output === input;

                return {
                  scores: [
                    {
                      name: "Exact match",
                      value: matchesOutput,
                      dataType: "BOOLEAN",
                      comment: matchesOutput
                        ? "Output exactly matches the input."
                        : "Output does not match the input.",
                    },
                  ],
                };
              }
            sourceCodeLanguage: TYPESCRIPT
            type: code
          response:
            body:
              createdAt: '2026-03-30T09:10:00.000Z'
              evaluationRuleCount: 0
              id: evaltmpl_ts_123
              name: exact-match
              scope: project
              sourceCode: |
                function evaluate(ctx: EvaluationContext): EvaluationResult {
                  const input = ctx.observation.input;
                  const matchesOutput =
                    input !== undefined && ctx.observation.output === input;

                  return {
                    scores: [
                      {
                        name: "Exact match",
                        value: matchesOutput,
                        dataType: "BOOLEAN",
                        comment: matchesOutput
                          ? "Output exactly matches the input."
                          : "Output does not match the input.",
                      },
                    ],
                  };
                }
              sourceCodeLanguage: TYPESCRIPT
              type: code
              updatedAt: '2026-03-30T09:10:00.000Z'
              variables:
                - input
                - output
                - metadata
                - experimentItemExpectedOutput
                - experimentItemMetadata
              version: 1
        - docs: >
            Create a Python code evaluator named `exact-match`.


            Send only the `evaluate` function; Langfuse injects the
            `EvaluationContext`,

            `EvaluationResult`, and `Score` definitions at runtime.

            Code evaluators always expose the fixed runtime payload variables
            and do not take a `mapping`.
          name: CreatePythonCodeEvaluator
          request:
            name: exact-match
            sourceCode: |
              def evaluate(ctx: EvaluationContext) -> EvaluationResult:
                  """Evaluates one observation and returns one or more Langfuse scores."""
                  input = ctx.observation.input
                  matches_output = input is not None and ctx.observation.output == input

                  return EvaluationResult(
                      scores=[
                          Score(
                              name="Exact match",
                              value=matches_output,
                              data_type="BOOLEAN",
                              comment=(
                                  "Output exactly matches the input."
                                  if matches_output
                                  else "Output does not match the input."
                              ),
                          )
                      ]
                  )
            sourceCodeLanguage: PYTHON
            type: code
          response:
            body:
              createdAt: '2026-03-30T09:15:00.000Z'
              evaluationRuleCount: 0
              id: evaltmpl_py_123
              name: exact-match
              scope: project
              sourceCode: |
                def evaluate(ctx: EvaluationContext) -> EvaluationResult:
                    """Evaluates one observation and returns one or more Langfuse scores."""
                    input = ctx.observation.input
                    matches_output = input is not None and ctx.observation.output == input

                    return EvaluationResult(
                        scores=[
                            Score(
                                name="Exact match",
                                value=matches_output,
                                data_type="BOOLEAN",
                                comment=(
                                    "Output exactly matches the input."
                                    if matches_output
                                    else "Output does not match the input."
                                ),
                            )
                        ]
                    )
              sourceCodeLanguage: PYTHON
              type: code
              updatedAt: '2026-03-30T09:15:00.000Z'
              variables:
                - input
                - output
                - metadata
                - experimentItemExpectedOutput
                - experimentItemMetadata
              version: 1
      method: POST
      path: /evaluators
      request: CreateEvaluatorRequest
      response: Evaluator
    delete:
      docs: >
        Delete an evaluator.


        Important behavior:

        - This deletes the evaluator including all of its stored versions;
        `evaluatorId` may reference any version.

        - The API returns `409` while evaluation rules still reference the
        evaluator. Delete those evaluation rules first.

        - Langfuse-managed evaluators (`scope=managed`) cannot be deleted; the
        API returns `403`.

        - Scores already produced by the evaluator are not deleted.
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.NotFoundError
        - errors.MethodNotAllowedError
        - errors.ConflictError
        - errors.TooManyRequestsError
        - errors.InternalServerError
      method: DELETE
      path: /evaluators/{evaluatorId}
      path-parameters:
        evaluatorId:
          docs: Evaluator identifier returned by the evaluator endpoints.
          type: string
      response: DeleteEvaluatorResponse
    get:
      docs: >
        Get one evaluator by `id`.


        Use this endpoint when you want the prompt, output definition, model
        configuration, and derived variables for the evaluator you plan to use
        in an evaluation rule.
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.NotFoundError
        - errors.MethodNotAllowedError
        - errors.TooManyRequestsError
        - errors.InternalServerError
      method: GET
      path: /evaluators/{evaluatorId}
      path-parameters:
        evaluatorId:
          docs: Evaluator identifier returned by the evaluator endpoints.
          type: string
      response: Evaluator
    list:
      docs: >
        List the evaluators available to the authenticated project.


        Important behavior:

        - This endpoint returns the latest version of each available evaluator.

        - Results can include evaluators from your project and Langfuse-managed
        evaluators.

        - If the same evaluator name exists in both places, both are returned as
        separate items with different `scope` values.
      errors:
        - errors.BadRequestError
        - errors.UnauthorizedError
        - errors.AccessDeniedError
        - errors.MethodNotAllowedError
        - errors.TooManyRequestsError
        - errors.InternalServerError
      method: GET
      path: /evaluators
      request:
        name: ListEvaluatorsRequest
        query-parameters:
          limit:
            docs: Maximum number of items per page. Defaults to `50`.
            type: optional<integer>
          page:
            docs: 1-based page number. Defaults to `1`.
            type: optional<integer>
      response: Evaluators
