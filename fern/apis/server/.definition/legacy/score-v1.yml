imports:
  commons: ../commons.yml
  pagination: ../utils/pagination.yml
types:
  CreateScoreRequest:
    examples:
      - value:
          name: novelty
          traceId: cdef-1234-5678-90ab
          value: 0.9
      - value:
          dataType: NUMERIC
          name: consistency
          traceId: cdef-1234-5678-90ab
          value: 1.2
      - value:
          configId: 9203-4567-89ab-cdef
          dataType: NUMERIC
          environment: test
          name: accuracy
          traceId: cdef-1234-5678-90ab
          value: 0.9
      - value:
          environment: production
          name: toxicity
          traceId: cdef-1234-5678-90ab
          value: not toxic
      - value:
          configId: 1234-5678-90ab-cdef
          dataType: CATEGORICAL
          name: correctness
          traceId: cdef-1234-5678-90ab
          value: partially correct
      - value:
          dataType: BOOLEAN
          name: hallucination
          traceId: cdef-1234-5678-90ab
          value: 0
      - value:
          configId: 1234-5678-90ab-cdef
          dataType: BOOLEAN
          name: helpfulness
          traceId: cdef-1234-5678-90ab
          value: 1
      - value:
          dataType: TEXT
          name: feedback
          traceId: cdef-1234-5678-90ab
          value: Great explanation of the concept
      - value:
          configId: 9203-4567-89ab-cdef
          dataType: NUMERIC
          name: accuracy
          queueId: aq-1234-5678-90ab-cdef
          source: ANNOTATION
          traceId: cdef-1234-5678-90ab
          value: 0.9
    properties:
      comment: optional<string>
      configId:
        docs: >-
          Reference a score config on a score. The unique langfuse identifier of
          a score config. When passing this field, the dataType and stringValue
          fields are automatically populated.
        type: optional<string>
      datasetRunId: optional<string>
      dataType:
        docs: >-
          The data type of the score. When passing a configId this field is
          inferred. Otherwise, this field must be passed or will default to
          numeric.
        type: optional<commons.ScoreDataType>
      environment:
        docs: >-
          The environment of the score. Can be any lowercase alphanumeric string
          with hyphens and underscores that does not start with 'langfuse'.
        type: optional<string>
      id: optional<string>
      metadata: optional<map<string, unknown>>
      name: string
      observationId: optional<string>
      queueId:
        docs: >-
          The annotation queue referenced by the score. Indicates if score was
          initially created while processing annotation queue.
        type: optional<string>
      sessionId: optional<string>
      source:
        docs: >-
          The source of the score. Defaults to API. Set to ANNOTATION to prefill
          scores (e.g. from an LLM) for a human reviewer to verify in an
          annotation queue. When source is ANNOTATION, a configId is required
          unless dataType is CORRECTION. EVAL is reserved for internal evaluator
          outputs and is not accepted on this endpoint.
        type: optional<CreateScoreSource>
      traceId: optional<string>
      value:
        docs: >-
          The value of the score. Must be passed as string for categorical and
          text scores, and numeric for boolean and numeric scores. Boolean score
          values must equal either 1 or 0 (true or false). Text score values
          must be between 1 and 500 characters.
        type: commons.CreateScoreValue
  CreateScoreResponse:
    properties:
      id:
        docs: The id of the created object in Langfuse
        type: string
  CreateScoreSource:
    docs: |
      Source values accepted when creating a score via the public REST API.
      EVAL is reserved for internal evaluator outputs and is intentionally not
      exposed here — use commons.ScoreSource when reading scores.
    enum:
      - API
      - ANNOTATION
service:
  auth: true
  base-path: /api/public
  endpoints:
    create:
      docs: Create a score (supports both trace and session scores)
      method: POST
      path: /scores
      request: CreateScoreRequest
      response: CreateScoreResponse
    delete:
      docs: Delete a score (supports both trace and session scores)
      method: DELETE
      path: /scores/{scoreId}
      path-parameters:
        scoreId:
          docs: The unique langfuse identifier of a score
          type: string
