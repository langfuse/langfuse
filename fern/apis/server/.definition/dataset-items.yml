imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  CreateDatasetItemRequest:
    properties:
      datasetName: string
      expectedOutput: optional<unknown>
      id:
        docs: >-
          Dataset items are upserted on their id. Id needs to be unique
          (project-level), cannot be reused across datasets, and must be at most
          255 characters.
        type: optional<string>
      input: optional<unknown>
      metadata: optional<unknown>
      sourceObservationId: optional<string>
      sourceTraceId: optional<string>
      status:
        docs: Defaults to ACTIVE for newly created items
        type: optional<commons.DatasetStatus>
  DeleteDatasetItemResponse:
    properties:
      message:
        docs: Success message after deletion
        type: string
  PaginatedDatasetItems:
    properties:
      data: list<commons.DatasetItem>
      meta: pagination.MetaResponse
service:
  auth: true
  base-path: /api/public
  endpoints:
    create:
      docs: Create a dataset item
      method: POST
      path: /dataset-items
      request: CreateDatasetItemRequest
      response: commons.DatasetItem
    delete:
      docs: >-
        Delete a dataset item and all its run items. This action is
        irreversible.
      method: DELETE
      path: /dataset-items/{id}
      path-parameters:
        id:
          type: string
      response: DeleteDatasetItemResponse
    get:
      docs: Get a dataset item
      method: GET
      path: /dataset-items/{id}
      path-parameters:
        id:
          type: string
      response: commons.DatasetItem
    list:
      docs: >
        Get dataset items. Optionally specify a version to get the items as they
        existed at that point in time.

        Note: If version parameter is provided, datasetName must also be
        provided.
      method: GET
      path: /dataset-items
      request:
        name: GetDatasetItemsRequest
        query-parameters:
          datasetName: optional<string>
          limit:
            docs: limit of items per page
            type: optional<integer>
          page:
            docs: page number, starts at 1
            type: optional<integer>
          sourceObservationId: optional<string>
          sourceTraceId: optional<string>
          version:
            docs: >
              ISO 8601 timestamp (RFC 3339, Section 5.6) in UTC (e.g.,
              "2026-01-21T14:35:42Z").

              If provided, returns state of dataset at this timestamp.

              If not provided, returns the latest version. Requires datasetName
              to be specified.
            type: optional<datetime>
      response: PaginatedDatasetItems
