imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
  scim: ./scim.yml
types:
  BasePrompt:
    properties:
      commitMessage:
        docs: Commit message for this prompt version.
        type: optional<string>
      config: unknown
      labels:
        docs: List of deployment labels of this prompt version.
        type: list<string>
      name: string
      resolutionGraph:
        docs: >-
          The dependency resolution graph for the current prompt. Null if the
          prompt has no dependencies or if `resolve=false` was used.
        type: optional<map<string, unknown>>
      tags:
        docs: >-
          List of tags. Used to filter via UI and API. The same across versions
          of a prompt.
        type: list<string>
      version: integer
  ChatMessage:
    properties:
      content:
        type: string
      role:
        type: string
      type:
        type: optional<ChatMessageType>
  ChatMessageType:
    enum:
      - chatmessage
  ChatMessageWithPlaceholders:
    discriminated: false
    union:
      - ChatMessage
      - PlaceholderMessage
  ChatPrompt:
    extends: BasePrompt
    properties:
      prompt: list<ChatMessageWithPlaceholders>
  CreateChatPromptRequest:
    properties:
      commitMessage:
        docs: Commit message for this prompt version.
        type: optional<string>
      config: optional<unknown>
      labels:
        docs: List of deployment labels of this prompt version.
        type: optional<list<string>>
      name: string
      prompt: list<ChatMessageWithPlaceholders>
      tags:
        docs: List of tags to apply to all versions of this prompt.
        type: optional<list<string>>
      type: CreateChatPromptType
  CreateChatPromptType:
    enum:
      - chat
  CreatePromptRequest:
    discriminated: false
    union:
      - CreateChatPromptRequest
      - CreateTextPromptRequest
  CreateTextPromptRequest:
    properties:
      commitMessage:
        docs: Commit message for this prompt version.
        type: optional<string>
      config: optional<unknown>
      labels:
        docs: List of deployment labels of this prompt version.
        type: optional<list<string>>
      name: string
      prompt: string
      tags:
        docs: List of tags to apply to all versions of this prompt.
        type: optional<list<string>>
      type: optional<CreateTextPromptType>
  CreateTextPromptType:
    enum:
      - text
  PlaceholderMessage:
    properties:
      name:
        type: string
      type: optional<PlaceholderMessageType>
  PlaceholderMessageType:
    enum:
      - placeholder
  Prompt:
    union:
      chat: ChatPrompt
      text: TextPrompt
  PromptMeta:
    properties:
      labels: list<string>
      lastConfig:
        docs: >-
          Config object of the most recent prompt version that matches the
          filters (if any are provided)
        type: unknown
      lastUpdatedAt: datetime
      name: string
      tags: list<string>
      type:
        docs: Indicates whether the prompt is a text or chat prompt.
        type: PromptType
      versions: list<integer>
  PromptMetaListResponse:
    properties:
      data: list<PromptMeta>
      meta: pagination.MetaResponse
  PromptType:
    enum:
      - chat
      - text
  TextPrompt:
    extends: BasePrompt
    properties:
      prompt: string
service:
  auth: true
  base-path: /api/public/v2
  endpoints:
    create:
      docs: Create a new version for the prompt with the given `name`
      method: POST
      path: /prompts
      request: CreatePromptRequest
      response: Prompt
    delete:
      docs: >-
        Delete prompt versions. If neither version nor label is specified, all
        versions of the prompt are deleted.
      method: DELETE
      path: /prompts/{promptName}
      path-parameters:
        promptName:
          docs: The name of the prompt
          type: string
      request:
        name: DeletePromptRequest
        query-parameters:
          label:
            docs: >-
              Optional label to filter deletion. If specified, deletes all
              prompt versions that have this label.
            type: optional<string>
          version:
            docs: >-
              Optional version to filter deletion. If specified, deletes only
              this specific version of the prompt.
            type: optional<integer>
    get:
      docs: Get a prompt
      method: GET
      path: /prompts/{promptName}
      path-parameters:
        promptName:
          docs: >
            The name of the prompt. If the prompt is in a folder (e.g.,
            "folder/subfolder/prompt-name"), 

            the folder path must be URL encoded.
          type: string
      request:
        name: GetPromptRequest
        query-parameters:
          label:
            docs: >-
              Label of the prompt to be retrieved. Defaults to "production" if
              no label or version is set.
            type: optional<string>
          resolve:
            docs: >-
              Resolve prompt dependencies before returning the prompt. Defaults
              to `true`. Set to `false` to return the raw stored prompt with
              dependency tags intact. This bypasses prompt caching and is
              intended for debugging or one-off jobs, not production runtime
              fetches.
            type: optional<boolean>
          version:
            docs: Version of the prompt to be retrieved.
            type: optional<integer>
      response: Prompt
    list:
      docs: Get a list of prompt names with versions and labels
      method: GET
      path: /prompts
      request:
        name: ListPromptsMetaRequest
        query-parameters:
          fromUpdatedAt:
            docs: >-
              Optional filter to only include prompt versions created/updated on
              or after a certain datetime (ISO 8601)
            type: optional<datetime>
          label: optional<string>
          limit:
            docs: limit of items per page
            type: optional<integer>
          name: optional<string>
          page:
            docs: page number, starts at 1
            type: optional<integer>
          tag: optional<string>
          toUpdatedAt:
            docs: >-
              Optional filter to only include prompt versions created/updated
              before a certain datetime (ISO 8601)
            type: optional<datetime>
      response: PromptMetaListResponse
