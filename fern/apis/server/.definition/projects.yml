imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  ApiKeyDeletionResponse:
    docs: Response for API key deletion
    properties:
      success: boolean
  ApiKeyList:
    docs: List of API keys for a project
    properties:
      apiKeys: list<ApiKeySummary>
  ApiKeyResponse:
    docs: Response for API key creation
    properties:
      createdAt: datetime
      displaySecretKey: string
      id: string
      note: optional<string>
      publicKey: string
      secretKey: string
  ApiKeySummary:
    docs: Summary of an API key
    properties:
      createdAt: datetime
      displaySecretKey: string
      expiresAt: optional<datetime>
      id: string
      lastUsedAt: optional<datetime>
      note: optional<string>
      publicKey: string
  Organization:
    properties:
      id:
        docs: The unique identifier of the organization
        type: string
      name:
        docs: The name of the organization
        type: string
  Project:
    properties:
      id: string
      metadata:
        docs: Metadata for the project
        type: map<string, unknown>
      name: string
      organization:
        docs: The organization this project belongs to
        type: Organization
      retentionDays:
        docs: >-
          Number of days to retain data. Null or 0 means no retention. Omitted
          if no retention is configured.
        type: optional<integer>
  ProjectDeletionResponse:
    properties:
      message: string
      success: boolean
  Projects:
    properties:
      data: list<Project>
service:
  auth: true
  base-path: /api/public
  endpoints:
    create:
      docs: Create a new project (requires organization-scoped API key)
      method: POST
      path: /projects
      request:
        body:
          properties:
            metadata:
              docs: Optional metadata for the project
              type: optional<map<string, unknown>>
            name: string
            retention:
              docs: >-
                Number of days to retain data. Must be 0 or at least 3 days.
                Requires data-retention entitlement for non-zero values.
                Optional.
              type: integer
        name: CreateProjectRequest
      response: Project
    createApiKey:
      docs: >-
        Create a new API key for a project (requires organization-scoped API
        key)
      method: POST
      path: /projects/{projectId}/apiKeys
      path-parameters:
        projectId: string
      request:
        body:
          properties:
            note:
              docs: Optional note for the API key
              type: optional<string>
            publicKey:
              docs: >-
                Optional predefined public key. Must start with 'pk-lf-'. If
                provided, secretKey must also be provided.
              type: optional<string>
            secretKey:
              docs: >-
                Optional predefined secret key. Must start with 'sk-lf-'. If
                provided, publicKey must also be provided.
              type: optional<string>
        name: CreateApiKeyRequest
      response: ApiKeyResponse
    delete:
      docs: >-
        Delete a project by ID (requires organization-scoped API key). Project
        deletion is processed asynchronously.
      method: DELETE
      path: /projects/{projectId}
      path-parameters:
        projectId: string
      response:
        status-code: 202
        type: ProjectDeletionResponse
    deleteApiKey:
      docs: Delete an API key for a project (requires organization-scoped API key)
      method: DELETE
      path: /projects/{projectId}/apiKeys/{apiKeyId}
      path-parameters:
        apiKeyId: string
        projectId: string
      response: ApiKeyDeletionResponse
    get:
      docs: >-
        Get Project associated with API key (requires project-scoped API key).
        You can use GET /api/public/organizations/projects to get all projects
        with an organization-scoped key.
      method: GET
      path: /projects
      response: Projects
    getApiKeys:
      docs: Get all API keys for a project (requires organization-scoped API key)
      method: GET
      path: /projects/{projectId}/apiKeys
      path-parameters:
        projectId: string
      response: ApiKeyList
    update:
      docs: Update a project by ID (requires organization-scoped API key).
      method: PUT
      path: /projects/{projectId}
      path-parameters:
        projectId: string
      request:
        body:
          properties:
            metadata:
              docs: Optional metadata for the project
              type: optional<map<string, unknown>>
            name: string
            retention:
              docs: |
                Number of days to retain data.
                Must be 0 or at least 3 days.
                Requires data-retention entitlement for non-zero values.
                Optional. Will retain existing retention setting if omitted.
              type: optional<integer>
        name: UpdateProjectRequest
      response: Project
