imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  CreateScoreConfigRequest:
    properties:
      categories:
        docs: >-
          Configure custom categories for categorical scores. Pass a list of
          objects with `label` and `value` properties. Categories are
          autogenerated for boolean configs and cannot be passed
        type: optional<list<commons.ConfigCategory>>
      dataType: commons.ScoreConfigDataType
      description:
        docs: >-
          Description is shown across the Langfuse UI and can be used to e.g.
          explain the config categories in detail, why a numeric range was set,
          or provide additional context on config name or usage
        type: optional<string>
      maxValue:
        docs: >-
          Configure a maximum value for numerical scores. If not set, the
          maximum value defaults to +∞
        type: optional<double>
      minValue:
        docs: >-
          Configure a minimum value for numerical scores. If not set, the
          minimum value defaults to -∞
        type: optional<double>
      name:
        docs: >-
          Name of the score config. Max 35 characters. Only letters, numbers,
          underscores, spaces, periods, parentheses, and hyphens are allowed.
        type: string
  ScoreConfigs:
    properties:
      data: list<commons.ScoreConfig>
      meta: pagination.MetaResponse
  UpdateScoreConfigRequest:
    properties:
      categories:
        docs: >-
          Configure custom categories for categorical scores. Pass a list of
          objects with `label` and `value` properties. Categories are
          autogenerated for boolean configs and cannot be passed
        type: optional<list<commons.ConfigCategory>>
      description:
        docs: >-
          Description is shown across the Langfuse UI and can be used to e.g.
          explain the config categories in detail, why a numeric range was set,
          or provide additional context on config name or usage
        type: optional<string>
      isArchived:
        docs: The status of the score config showing if it is archived or not
        type: optional<boolean>
      maxValue:
        docs: >-
          Configure a maximum value for numerical scores. If not set, the
          maximum value defaults to +∞
        type: optional<double>
      minValue:
        docs: >-
          Configure a minimum value for numerical scores. If not set, the
          minimum value defaults to -∞
        type: optional<double>
      name:
        docs: >-
          Name of the score config. Max 35 characters. Only letters, numbers,
          underscores, spaces, periods, parentheses, and hyphens are allowed.
        type: optional<string>
service:
  auth: true
  base-path: /api/public
  endpoints:
    create:
      docs: >-
        Create a score configuration (config). Score configs are used to define
        the structure of scores
      method: POST
      path: /score-configs
      request: CreateScoreConfigRequest
      response: commons.ScoreConfig
    get:
      docs: Get all score configs
      method: GET
      path: /score-configs
      request:
        name: GetScoreConfigsRequest
        query-parameters:
          limit:
            docs: >-
              Limit of items per page. If you encounter api issues due to too
              large page sizes, try to reduce the limit
            type: optional<integer>
          page:
            docs: Page number, starts at 1.
            type: optional<integer>
      response: ScoreConfigs
    get-by-id:
      docs: Get a score config
      method: GET
      path: /score-configs/{configId}
      path-parameters:
        configId:
          docs: The unique langfuse identifier of a score config
          type: string
      response: commons.ScoreConfig
    update:
      docs: Update a score config
      method: PATCH
      path: /score-configs/{configId}
      path-parameters:
        configId:
          docs: The unique langfuse identifier of a score config
          type: string
      request: UpdateScoreConfigRequest
      response: commons.ScoreConfig
