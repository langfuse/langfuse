imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  CreateDatasetRequest:
    properties:
      description: optional<string>
      expectedOutputSchema:
        docs: >-
          JSON Schema for validating dataset item expected outputs. When set,
          all new and existing dataset items will be validated against this
          schema.
        type: optional<unknown>
      inputSchema:
        docs: >-
          JSON Schema for validating dataset item inputs. When set, all new and
          existing dataset items will be validated against this schema.
        type: optional<unknown>
      metadata: optional<unknown>
      name: string
  DeleteDatasetRunResponse:
    properties:
      message: string
  PaginatedDatasetRuns:
    properties:
      data: list<commons.DatasetRun>
      meta: pagination.MetaResponse
  PaginatedDatasets:
    properties:
      data: list<commons.Dataset>
      meta: pagination.MetaResponse
service:
  auth: true
  base-path: /api/public
  endpoints:
    create:
      docs: Create a dataset
      method: POST
      path: /v2/datasets
      request: CreateDatasetRequest
      response: commons.Dataset
    deleteRun:
      docs: Delete a dataset run and all its run items. This action is irreversible.
      method: DELETE
      path: /datasets/{datasetName}/runs/{runName}
      path-parameters:
        datasetName: string
        runName: string
      response: DeleteDatasetRunResponse
    get:
      docs: Get a dataset
      method: GET
      path: /v2/datasets/{datasetName}
      path-parameters:
        datasetName: string
      response: commons.Dataset
    getRun:
      docs: Get a dataset run and its items
      method: GET
      path: /datasets/{datasetName}/runs/{runName}
      path-parameters:
        datasetName: string
        runName: string
      response: commons.DatasetRunWithItems
    getRuns:
      docs: Get dataset runs
      method: GET
      path: /datasets/{datasetName}/runs
      path-parameters:
        datasetName: string
      request:
        name: GetDatasetRunsRequest
        query-parameters:
          limit:
            docs: limit of items per page
            type: optional<integer>
          page:
            docs: page number, starts at 1
            type: optional<integer>
      response: PaginatedDatasetRuns
    list:
      docs: Get all datasets
      method: GET
      path: /v2/datasets
      request:
        name: GetDatasetsRequest
        query-parameters:
          limit:
            docs: limit of items per page
            type: optional<integer>
          page:
            docs: page number, starts at 1
            type: optional<integer>
      response: PaginatedDatasets
