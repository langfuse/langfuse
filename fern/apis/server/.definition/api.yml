imports:
  commons: commons.yml
auth: basic
docs: >
  ## Authentication


  Authenticate with the API using [Basic
  Auth](https://en.wikipedia.org/wiki/Basic_access_authentication), get API keys
  in the project settings:


  - username: Langfuse Public Key

  - password: Langfuse Secret Key


  ## Exports


  - OpenAPI spec: https://cloud.langfuse.com/generated/api/openapi.yml
error-discrimination:
  strategy: status-code
errors:
  - commons.Error
  - commons.UnauthorizedError
  - commons.AccessDeniedError
  - commons.MethodNotAllowedError
  - commons.NotFoundError
headers:
  X-Langfuse-Public-Key: optional<string>
  X-Langfuse-Sdk-Name: optional<string>
  X-Langfuse-Sdk-Version: optional<string>
name: langfuse
