imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  DeleteMembershipRequest:
    properties:
      userId: string
  MembershipDeletionResponse:
    properties:
      message: string
      userId: string
  MembershipRequest:
    properties:
      role: MembershipRole
      userId: string
  MembershipResponse:
    properties:
      email: string
      name: string
      role: MembershipRole
      userId: string
  MembershipRole:
    enum:
      - OWNER
      - ADMIN
      - MEMBER
      - VIEWER
  MembershipsResponse:
    properties:
      memberships: list<MembershipResponse>
  OrganizationApiKey:
    properties:
      createdAt: datetime
      displaySecretKey: string
      expiresAt: optional<datetime>
      id: string
      lastUsedAt: optional<datetime>
      note: optional<string>
      publicKey: string
  OrganizationApiKeysResponse:
    properties:
      apiKeys: list<OrganizationApiKey>
  OrganizationProject:
    properties:
      createdAt: datetime
      id: string
      metadata: optional<map<string, unknown>>
      name: string
      updatedAt: datetime
  OrganizationProjectsResponse:
    properties:
      projects: list<OrganizationProject>
service:
  auth: true
  base-path: /api/public
  endpoints:
    deleteOrganizationMembership:
      docs: >-
        Delete a membership from the organization associated with the API key
        (requires organization-scoped API key)
      method: DELETE
      path: /organizations/memberships
      request: DeleteMembershipRequest
      response: MembershipDeletionResponse
    deleteProjectMembership:
      docs: >-
        Delete a membership from a specific project (requires
        organization-scoped API key). The user must be a member of the
        organization.
      method: DELETE
      path: /projects/{projectId}/memberships
      path-parameters:
        projectId: string
      request: DeleteMembershipRequest
      response: MembershipDeletionResponse
    getOrganizationApiKeys:
      docs: >-
        Get all API keys for the organization associated with the API key
        (requires organization-scoped API key)
      method: GET
      path: /organizations/apiKeys
      response: OrganizationApiKeysResponse
    getOrganizationMemberships:
      docs: >-
        Get all memberships for the organization associated with the API key
        (requires organization-scoped API key)
      method: GET
      path: /organizations/memberships
      response: MembershipsResponse
    getOrganizationProjects:
      docs: >-
        Get all projects for the organization associated with the API key
        (requires organization-scoped API key)
      method: GET
      path: /organizations/projects
      response: OrganizationProjectsResponse
    getProjectMemberships:
      docs: >-
        Get all memberships for a specific project (requires organization-scoped
        API key)
      method: GET
      path: /projects/{projectId}/memberships
      path-parameters:
        projectId: string
      response: MembershipsResponse
    updateOrganizationMembership:
      docs: >-
        Create or update a membership for the organization associated with the
        API key (requires organization-scoped API key)
      method: PUT
      path: /organizations/memberships
      request: MembershipRequest
      response: MembershipResponse
    updateProjectMembership:
      docs: >-
        Create or update a membership for a specific project (requires
        organization-scoped API key). The user must already be a member of the
        organization.
      method: PUT
      path: /projects/{projectId}/memberships
      path-parameters:
        projectId: string
      request: MembershipRequest
      response: MembershipResponse
