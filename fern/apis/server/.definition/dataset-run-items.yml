imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  CreateDatasetRunItemRequest:
    properties:
      createdAt:
        docs: >-
          Optional timestamp to set the createdAt field of the dataset run item.
          If not provided or null, defaults to current timestamp.
        type: optional<datetime>
      datasetItemId: string
      datasetVersion:
        docs: >
          ISO 8601 timestamp (RFC 3339, Section 5.6) in UTC (e.g.,
          "2026-01-21T14:35:42Z").

          Specifies the dataset version to use for this experiment run. 

          If provided, the experiment will use dataset items as they existed at
          or before this timestamp.

          If not provided, uses the latest version of dataset items.
        type: optional<datetime>
      metadata:
        docs: Metadata of the dataset run, updates run if run already exists
        type: optional<unknown>
      observationId: optional<string>
      runDescription:
        docs: Description of the run. If run exists, description will be updated.
        type: optional<string>
      runName: string
      traceId:
        docs: >-
          traceId should always be provided. For compatibility with older SDK
          versions it can also be inferred from the provided observationId.
        type: optional<string>
  PaginatedDatasetRunItems:
    properties:
      data: list<commons.DatasetRunItem>
      meta: pagination.MetaResponse
service:
  auth: true
  base-path: /api/public
  endpoints:
    create:
      docs: Create a dataset run item
      method: POST
      path: /dataset-run-items
      request: CreateDatasetRunItemRequest
      response: commons.DatasetRunItem
    list:
      docs: List dataset run items
      method: GET
      path: /dataset-run-items
      request:
        name: ListDatasetRunItemsRequest
        query-parameters:
          datasetId: string
          limit:
            docs: limit of items per page
            type: optional<integer>
          page:
            docs: page number, starts at 1
            type: optional<integer>
          runName: string
      response: PaginatedDatasetRunItems
