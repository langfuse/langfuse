imports:
  commons: ./commons.yml
  pagination: ./utils/pagination.yml
types:
  BaseEvent:
    properties:
      id:
        docs: UUID v4 that identifies the event
        type: string
      metadata:
        docs: Optional. Metadata field used by the Langfuse SDKs for debugging.
        type: optional<unknown>
      timestamp:
        docs: >-
          Datetime (ISO 8601) of event creation in client. Should be as close to
          actual event creation in client as possible, this timestamp will be
          used for ordering of events in future release. Resolution:
          milliseconds (required), microseconds (optimal).
        type: string
  CreateEventBody:
    extends: OptionalObservationBody
    properties:
      id: optional<string>
  CreateEventEvent:
    extends: BaseEvent
    properties:
      body: CreateEventBody
  CreateGenerationBody:
    extends: CreateSpanBody
    properties:
      completionStartTime: optional<datetime>
      costDetails: optional<map<string, double>>
      model: optional<string>
      modelParameters: optional<map<string, commons.MapValue>>
      promptName: optional<string>
      promptVersion: optional<integer>
      usage: optional<IngestionUsage>
      usageDetails: optional<UsageDetails>
  CreateGenerationEvent:
    extends: BaseEvent
    properties:
      body: CreateGenerationBody
  CreateObservationEvent:
    extends: BaseEvent
    properties:
      body: ObservationBody
  CreateSpanBody:
    extends: CreateEventBody
    properties:
      endTime: optional<datetime>
  CreateSpanEvent:
    extends: BaseEvent
    properties:
      body: CreateSpanBody
  IngestionError:
    properties:
      error: optional<unknown>
      id: string
      message: optional<string>
      status: integer
  IngestionEvent:
    discriminant: type
    union:
      event-create:
        docs: Creates an event.
        type: CreateEventEvent
      generation-create:
        docs: Creates a new generation.
        type: CreateGenerationEvent
      generation-update:
        docs: Updates a generation based on id.
        type: UpdateGenerationEvent
      observation-create:
        docs: Deprecated event type
        type: CreateObservationEvent
      observation-update:
        docs: Deprecated event type
        type: UpdateObservationEvent
      score-create:
        docs: >-
          Creates a new score. Upserts on id for updates if score with id
          exists.
        type: ScoreEvent
      sdk-log:
        docs: Langfuse SDKs only, used for debugging purposes.
        type: SDKLogEvent
      span-create:
        docs: Creates a new span.
        type: CreateSpanEvent
      span-update:
        docs: Updates span based on id.
        type: UpdateSpanEvent
      trace-create:
        docs: >-
          Creates a new trace. Upserts on id for updates if trace with id
          exists.
        type: TraceEvent
  IngestionResponse:
    properties:
      errors: list<IngestionError>
      successes: list<IngestionSuccess>
  IngestionSuccess:
    properties:
      id: string
      status: integer
  IngestionUsage:
    discriminated: false
    union:
      - commons.Usage
      - OpenAIUsage
  ObservationBody:
    properties:
      completionStartTime: optional<datetime>
      endTime: optional<datetime>
      environment: optional<string>
      id: optional<string>
      input: optional<unknown>
      level: optional<commons.ObservationLevel>
      metadata: optional<unknown>
      model: optional<string>
      modelParameters: optional<map<string, commons.MapValue>>
      name: optional<string>
      output: optional<unknown>
      parentObservationId: optional<string>
      startTime: optional<datetime>
      statusMessage: optional<string>
      traceId: optional<string>
      type: ObservationType
      usage: optional<commons.Usage>
      version: optional<string>
  ObservationType:
    enum:
      - SPAN
      - GENERATION
      - EVENT
      - AGENT
      - TOOL
      - CHAIN
      - RETRIEVER
      - EVALUATOR
      - EMBEDDING
      - GUARDRAIL
  OpenAICompletionUsageSchema:
    docs: OpenAI Usage schema from (Chat-)Completion APIs
    properties:
      completion_tokens: integer
      completion_tokens_details: optional<map<string, optional<integer>>>
      prompt_tokens: integer
      prompt_tokens_details: optional<map<string, optional<integer>>>
      total_tokens: integer
  OpenAIResponseUsageSchema:
    docs: OpenAI Usage schema from Response API
    properties:
      input_tokens: integer
      input_tokens_details: optional<map<string, optional<integer>>>
      output_tokens: integer
      output_tokens_details: optional<map<string, optional<integer>>>
      total_tokens: integer
  OpenAIUsage:
    docs: Usage interface of OpenAI for improved compatibility.
    properties:
      completionTokens: optional<integer>
      promptTokens: optional<integer>
      totalTokens: optional<integer>
  OptionalObservationBody:
    properties:
      environment: optional<string>
      input: optional<unknown>
      level: optional<commons.ObservationLevel>
      metadata: optional<unknown>
      name: optional<string>
      output: optional<unknown>
      parentObservationId: optional<string>
      startTime: optional<datetime>
      statusMessage: optional<string>
      traceId: optional<string>
      version: optional<string>
  ScoreBody:
    examples:
      - value:
          name: novelty
          traceId: cdef-1234-5678-90ab
          value: 0.9
      - value:
          dataType: NUMERIC
          name: consistency
          traceId: cdef-1234-5678-90ab
          value: 1.2
      - value:
          configId: 9203-4567-89ab-cdef
          dataType: NUMERIC
          name: accuracy
          traceId: cdef-1234-5678-90ab
          value: 0.9
      - value:
          name: toxicity
          traceId: cdef-1234-5678-90ab
          value: not toxic
      - value:
          configId: 1234-5678-90ab-cdef
          dataType: CATEGORICAL
          name: correctness
          traceId: cdef-1234-5678-90ab
          value: partially correct
      - value:
          dataType: BOOLEAN
          name: hallucination
          traceId: cdef-1234-5678-90ab
          value: 0
      - value:
          configId: 1234-5678-90ab-cdef
          dataType: BOOLEAN
          name: helpfulness
          traceId: cdef-1234-5678-90ab
          value: 1
      - value:
          name: contextrelevant
          sessionId: abyt-1234-5678-80ab
          value: not relevant
      - value:
          datasetRunId: 7891-5678-90ab-hijk
          name: hallucination
          value: 0
    properties:
      comment: optional<string>
      configId:
        docs: >-
          Reference a score config on a score. When set, the score name must
          equal the config name and scores must comply with the config's range
          and data type. For categorical scores, the value must map to a config
          category. Numeric scores might be constrained by the score config's
          max and min values
        type: optional<string>
      datasetRunId: optional<string>
      dataType:
        docs: >-
          When set, must match the score value's type. If not set, will be
          inferred from the score value or config
        type: optional<commons.ScoreDataType>
      environment: optional<string>
      id: optional<string>
      metadata: optional<unknown>
      name:
        docs: >-
          The name of the score. Always overrides "output" for correction
          scores.
        type: string
      observationId: optional<string>
      queueId:
        docs: >-
          The annotation queue referenced by the score. Indicates if score was
          initially created while processing annotation queue.
        type: optional<string>
      sessionId: optional<string>
      traceId: optional<string>
      value:
        docs: >-
          The value of the score. Must be passed as string for categorical and
          text scores, and numeric for boolean and numeric scores. Boolean score
          values must equal either 1 or 0 (true or false). Text score values
          must be between 1 and 500 characters.
        type: commons.CreateScoreValue
  ScoreEvent:
    extends: BaseEvent
    properties:
      body: ScoreBody
  SDKLogBody:
    properties:
      log: unknown
  SDKLogEvent:
    extends: BaseEvent
    properties:
      body: SDKLogBody
  TraceBody:
    properties:
      environment: optional<string>
      id: optional<string>
      input: optional<unknown>
      metadata: optional<unknown>
      name: optional<string>
      output: optional<unknown>
      public:
        docs: Make trace publicly accessible via url
        type: optional<boolean>
      release: optional<string>
      sessionId: optional<string>
      tags: optional<list<string>>
      timestamp: optional<datetime>
      userId: optional<string>
      version: optional<string>
  TraceEvent:
    extends: BaseEvent
    properties:
      body: TraceBody
  UpdateEventBody:
    extends: OptionalObservationBody
    properties:
      id: string
  UpdateGenerationBody:
    extends: UpdateSpanBody
    properties:
      completionStartTime: optional<datetime>
      costDetails: optional<map<string, double>>
      model: optional<string>
      modelParameters: optional<map<string, commons.MapValue>>
      promptName: optional<string>
      promptVersion: optional<integer>
      usage: optional<IngestionUsage>
      usageDetails: optional<UsageDetails>
  UpdateGenerationEvent:
    extends: BaseEvent
    properties:
      body: UpdateGenerationBody
  UpdateObservationEvent:
    extends: BaseEvent
    properties:
      body: ObservationBody
  UpdateSpanBody:
    extends: UpdateEventBody
    properties:
      endTime: optional<datetime>
  UpdateSpanEvent:
    extends: BaseEvent
    properties:
      body: UpdateSpanBody
  UsageDetails:
    discriminated: false
    union:
      - map<string, integer>
      - OpenAICompletionUsageSchema
      - OpenAIResponseUsageSchema
service:
  auth: true
  base-path: /api/public
  endpoints:
    batch:
      availability:
        message: >-
          Use the OpenTelemetry endpoint at /api/public/otel/v1/traces instead.
          Learn more: https://langfuse.com/integrations/native/opentelemetry
        status: deprecated
      docs: >
        **Legacy endpoint for batch ingestion for Langfuse Observability.**


        -> Please use the OpenTelemetry endpoint (`/api/public/otel/v1/traces`).
        Learn more: https://langfuse.com/integrations/native/opentelemetry


        Within each batch, there can be multiple events.

        Each event has a type, an id, a timestamp, metadata and a body.

        Internally, we refer to this as the "event envelope" as it tells us
        something about the event but not the trace.

        We use the event id within this envelope to deduplicate messages to
        avoid processing the same event twice, i.e. the event id should be
        unique per request.

        The event.body.id is the ID of the actual trace and will be used for
        updates and will be visible within the Langfuse App.

        I.e. if you want to update a trace, you'd use the same body id, but
        separate event IDs.


        Notes:

        - Introduction to data model:
        https://langfuse.com/docs/observability/data-model

        - Batch sizes are limited to 3.5 MB in total. You need to adjust the
        number of events per batch accordingly.

        - The API does not return a 4xx status code for input errors. Instead,
        it responds with a 207 status code, which includes a list of the
        encountered errors.
      examples:
        - request:
            batch:
              - body:
                  environment: production
                  id: abcdef-1234-5678-90ab
                  input: My input
                  metadata: My metadata
                  name: My Trace
                  output: My output
                  public: true
                  release: 1.0.0
                  sessionId: 1234-5678-90ab-cdef
                  tags:
                    - tag1
                    - tag2
                  timestamp: '2022-01-01T00:00:00.000Z'
                  userId: 1234-5678-90ab-cdef
                  version: 1.0.0
                id: abcdef-1234-5678-90ab
                timestamp: '2022-01-01T00:00:00.000Z'
                type: trace-create
          response:
            body:
              errors: []
              successes:
                - id: abcdef-1234-5678-90ab
                  status: 201
        - request:
            batch:
              - body:
                  environment: test
                  id: abcdef-1234-5678-90ab
                  startTime: '2022-01-01T00:00:00.000Z'
                  traceId: 1234-5678-90ab-cdef
                id: abcdef-1234-5678-90ab
                timestamp: '2022-01-01T00:00:00.000Z'
                type: span-create
          response:
            body:
              errors: []
              successes:
                - id: abcdef-1234-5678-90ab
                  status: 201
        - request:
            batch:
              - body:
                  environment: default
                  id: abcdef-1234-5678-90ab
                  name: My Score
                  traceId: 1234-5678-90ab-cdef
                  value: 0.9
                id: abcdef-1234-5678-90ab
                timestamp: '2022-01-01T00:00:00.000Z'
                type: score-create
          response:
            body:
              errors: []
              successes:
                - id: abcdef-1234-5678-90ab
                  status: 201
      method: POST
      path: /ingestion
      request:
        body:
          properties:
            batch:
              docs: >-
                Batch of tracing events to be ingested. Discriminated by
                attribute `type`.
              type: list<IngestionEvent>
            metadata:
              docs: >-
                Optional. Metadata field used by the Langfuse SDKs for
                debugging.
              type: optional<unknown>
        name: IngestionRequest
      response:
        status-code: 207
        type: IngestionResponse
