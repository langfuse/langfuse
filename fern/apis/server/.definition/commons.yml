types:
  BaseScore:
    properties:
      authorUserId:
        docs: The user ID of the author
        type: nullable<string>
      comment:
        docs: Comment on the score
        type: nullable<string>
      configId:
        docs: >-
          Reference a score config on a score. When set, config and score name
          must be equal and value must comply to optionally defined numerical
          range
        type: nullable<string>
      createdAt: datetime
      datasetRunId:
        docs: The dataset run ID associated with the score
        type: optional<nullable<string>>
      environment:
        docs: >-
          The environment from which this score originated. Can be any lowercase
          alphanumeric string with hyphens and underscores that does not start
          with 'langfuse'.
        type: string
      id: string
      metadata:
        docs: Metadata associated with the score
        type: unknown
      name: string
      observationId:
        docs: The observation ID associated with the score
        type: optional<nullable<string>>
      queueId:
        docs: >-
          The annotation queue referenced by the score. Indicates if score was
          initially created while processing annotation queue.
        type: nullable<string>
      sessionId:
        docs: The session ID associated with the score
        type: optional<nullable<string>>
      source: ScoreSource
      timestamp: datetime
      traceId:
        docs: The trace ID associated with the score
        type: optional<nullable<string>>
      updatedAt: datetime
  BaseScoreV1:
    properties:
      authorUserId:
        docs: The user ID of the author
        type: nullable<string>
      comment:
        docs: Comment on the score
        type: nullable<string>
      configId:
        docs: >-
          Reference a score config on a score. When set, config and score name
          must be equal and value must comply to optionally defined numerical
          range
        type: nullable<string>
      createdAt: datetime
      environment:
        docs: >-
          The environment from which this score originated. Can be any lowercase
          alphanumeric string with hyphens and underscores that does not start
          with 'langfuse'.
        type: string
      id: string
      metadata:
        docs: Metadata associated with the score
        type: unknown
      name: string
      observationId:
        docs: The observation ID associated with the score
        type: optional<nullable<string>>
      queueId:
        docs: >-
          The annotation queue referenced by the score. Indicates if score was
          initially created while processing annotation queue.
        type: nullable<string>
      source: ScoreSource
      timestamp: datetime
      traceId: string
      updatedAt: datetime
  BooleanScore:
    extends: BaseScore
    properties:
      stringValue:
        docs: >-
          The string representation of the score value. Is inferred from the
          numeric value and equals "True" or "False"
        type: string
      value:
        docs: The numeric value of the score. Equals 1 for "True" and 0 for "False"
        type: double
  BooleanScoreV1:
    extends: BaseScoreV1
    properties:
      stringValue:
        docs: >-
          The string representation of the score value. Is inferred from the
          numeric value and equals "True" or "False"
        type: string
      value:
        docs: The numeric value of the score. Equals 1 for "True" and 0 for "False"
        type: double
  CategoricalScore:
    extends: BaseScore
    properties:
      stringValue:
        docs: >-
          The string representation of the score value. If no config is linked,
          can be any string. Otherwise, must map to a config category
        type: string
      value:
        docs: >-
          Represents the numeric category mapping of the stringValue. If no
          config is linked, defaults to 0.
        type: double
  CategoricalScoreV1:
    extends: BaseScoreV1
    properties:
      stringValue:
        docs: >-
          The string representation of the score value. If no config is linked,
          can be any string. Otherwise, must map to a config category
        type: string
      value:
        docs: >-
          Represents the numeric category mapping of the stringValue. If no
          config is linked, defaults to 0.
        type: double
  Comment:
    properties:
      authorUserId:
        docs: The user ID of the comment author
        type: optional<nullable<string>>
      content: string
      createdAt: datetime
      id: string
      objectId: string
      objectType: CommentObjectType
      projectId: string
      updatedAt: datetime
  CommentObjectType:
    enum:
      - TRACE
      - OBSERVATION
      - SESSION
      - PROMPT
  ConfigCategory:
    properties:
      label: string
      value: double
  CorrectionScore:
    extends: BaseScore
    properties:
      stringValue:
        docs: The string representation of the correction content
        type: string
      value:
        docs: The numeric value of the score. Always 0 for correction scores.
        type: double
  CreateScoreValue:
    discriminated: false
    docs: >-
      The value of the score. Must be passed as string for categorical and text
      scores, and numeric for boolean and numeric scores
    union:
      - double
      - string
  Dataset:
    properties:
      createdAt: datetime
      description:
        docs: Description of the dataset
        type: nullable<string>
      expectedOutputSchema:
        docs: JSON Schema for validating dataset item expected outputs
        type: nullable<unknown>
      id: string
      inputSchema:
        docs: JSON Schema for validating dataset item inputs
        type: nullable<unknown>
      metadata:
        docs: Metadata associated with the dataset
        type: unknown
      name: string
      projectId: string
      updatedAt: datetime
  DatasetItem:
    properties:
      createdAt: datetime
      datasetId: string
      datasetName: string
      expectedOutput:
        docs: Expected output for the dataset item
        type: unknown
      id: string
      input:
        docs: Input data for the dataset item
        type: unknown
      metadata:
        docs: Metadata associated with the dataset item
        type: unknown
      sourceObservationId:
        docs: The observation ID that sourced this dataset item
        type: nullable<string>
      sourceTraceId:
        docs: The trace ID that sourced this dataset item
        type: nullable<string>
      status: DatasetStatus
      updatedAt: datetime
  DatasetRun:
    properties:
      createdAt:
        docs: The date and time when the dataset run was created
        type: datetime
      datasetId:
        docs: Id of the associated dataset
        type: string
      datasetName:
        docs: Name of the associated dataset
        type: string
      description:
        docs: Description of the run
        type: nullable<string>
      id:
        docs: Unique identifier of the dataset run
        type: string
      metadata:
        docs: Metadata of the dataset run
        type: unknown
      name:
        docs: Name of the dataset run
        type: string
      updatedAt:
        docs: The date and time when the dataset run was last updated
        type: datetime
  DatasetRunItem:
    properties:
      createdAt: datetime
      datasetItemId: string
      datasetRunId: string
      datasetRunName: string
      id: string
      observationId:
        docs: The observation ID associated with this run item
        type: nullable<string>
      traceId: string
      updatedAt: datetime
  DatasetRunWithItems:
    extends: DatasetRun
    properties:
      datasetRunItems: list<DatasetRunItem>
  DatasetStatus:
    enum:
      - ACTIVE
      - ARCHIVED
  MapValue:
    discriminated: false
    union:
      - optional<string>
      - optional<integer>
      - optional<float>
      - optional<boolean>
      - optional<list<string>>
  Model:
    docs: >
      Model definition used for transforming usage into USD cost and/or
      tokenization.


      Models can have either simple flat pricing or tiered pricing:

      - Flat pricing: Single price per usage type (legacy, but still supported)

      - Tiered pricing: Multiple pricing tiers with conditional matching based
      on usage patterns


      The pricing tiers approach is recommended for models with usage-based
      pricing variations.

      When using tiered pricing, the flat price fields (inputPrice, outputPrice,
      prices) are populated

      from the default tier for backward compatibility.
    properties:
      createdAt:
        docs: Timestamp when the model was created
        type: datetime
      id: string
      inputPrice:
        docs: Deprecated. See 'prices' instead. Price (USD) per input unit
        type: nullable<double>
      isLangfuseManaged:
        type: boolean
      matchPattern:
        docs: >-
          Regex pattern which matches this model definition to generation.model.
          Useful in case of fine-tuned models. If you want to exact match, use
          `(?i)^modelname$`
        type: string
      modelName:
        docs: >-
          Name of the model definition. If multiple with the same name exist,
          they are applied in the following order: (1) custom over built-in, (2)
          newest according to startTime where
          model.startTime<observation.startTime
        type: string
      outputPrice:
        docs: Deprecated. See 'prices' instead. Price (USD) per output unit
        type: nullable<double>
      prices:
        docs: >
          Deprecated. Use 'pricingTiers' instead for models with usage-based
          pricing variations.


          This field shows prices by usage type from the default pricing tier.
          Maintained for backward compatibility.

          If the model uses tiered pricing, this field will be populated from
          the default tier's prices.
        type: map<string, ModelPrice>
      pricingTiers:
        docs: >
          Array of pricing tiers with conditional pricing based on usage
          thresholds.


          Pricing tiers enable accurate cost tracking for models that charge
          different rates based on usage patterns

          (e.g., different rates for high-volume usage, large context windows,
          or cached tokens).


          Each model must have exactly one default tier (isDefault=true,
          priority=0) that serves as a fallback.

          Additional conditional tiers can be defined with specific matching
          criteria.


          If this array is empty, the model uses legacy flat pricing from the
          inputPrice/outputPrice/totalPrice fields.
        type: list<PricingTier>
      startDate:
        docs: Apply only to generations which are newer than this ISO date.
        type: nullable<datetime>
      tokenizerConfig:
        docs: >-
          Optional. Configuration for the selected tokenizer. Needs to be JSON.
          See docs for more details.
        type: unknown
      tokenizerId:
        docs: >-
          Optional. Tokenizer to be applied to observations which match to this
          model. See docs for more details.
        type: nullable<string>
      totalPrice:
        docs: >-
          Deprecated. See 'prices' instead. Price (USD) per total unit. Cannot
          be set if input or output price is set.
        type: nullable<double>
      unit:
        docs: Unit used by this model.
        type: optional<nullable<ModelUsageUnit>>
  ModelPrice:
    properties:
      price: double
  ModelUsageUnit:
    docs: Unit of usage in Langfuse
    enum:
      - CHARACTERS
      - TOKENS
      - MILLISECONDS
      - SECONDS
      - IMAGES
      - REQUESTS
  NumericScore:
    extends: BaseScore
    properties:
      value:
        docs: The numeric value of the score
        type: double
  NumericScoreV1:
    extends: BaseScoreV1
    properties:
      value:
        docs: The numeric value of the score
        type: double
  Observation:
    properties:
      completionStartTime:
        docs: The completion start time of the observation
        type: nullable<datetime>
      costDetails:
        docs: >-
          The cost details of the observation. Key is the name of the cost
          metric, value is the cost in USD. The total key is the sum of all
          (non-total) cost metrics or the total value ingested.
        type: map<string, double>
      endTime:
        docs: The end time of the observation.
        type: nullable<datetime>
      environment:
        docs: >-
          The environment from which this observation originated. Can be any
          lowercase alphanumeric string with hyphens and underscores that does
          not start with 'langfuse'.
        type: string
      id:
        docs: The unique identifier of the observation
        type: string
      input:
        docs: The input data of the observation
        type: unknown
      level:
        docs: The level of the observation
        type: ObservationLevel
      metadata:
        docs: Additional metadata of the observation
        type: unknown
      model:
        docs: The model used for the observation
        type: nullable<string>
      modelParameters:
        docs: The parameters of the model used for the observation
        type: unknown
      name:
        docs: The name of the observation
        type: nullable<string>
      output:
        docs: The output data of the observation
        type: unknown
      parentObservationId:
        docs: The parent observation ID
        type: nullable<string>
      promptId:
        docs: The prompt ID associated with the observation
        type: nullable<string>
      startTime:
        docs: The start time of the observation
        type: datetime
      statusMessage:
        docs: The status message of the observation
        type: nullable<string>
      traceId:
        docs: The trace ID associated with the observation
        type: nullable<string>
      type:
        docs: The type of the observation
        type: string
      usage:
        docs: >-
          (Deprecated. Use usageDetails and costDetails instead.) The usage data
          of the observation
        type: Usage
      usageDetails:
        docs: >-
          The usage details of the observation. Key is the name of the usage
          metric, value is the number of units consumed. The total key is the
          sum of all (non-total) usage metrics or the total value ingested.
        type: map<string, integer>
      version:
        docs: The version of the observation
        type: nullable<string>
