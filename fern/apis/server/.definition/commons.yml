        type: optional<nullable<string>>
      version:
        docs: The version of the observation
        type: optional<nullable<string>>
  PricingTier:
    docs: >
      Pricing tier definition with conditional pricing based on usage
      thresholds.


      Pricing tiers enable accurate cost tracking for LLM providers that charge
      different rates based on usage patterns.

      For example, some providers charge higher rates when context size exceeds
      certain thresholds.


      How tier matching works:

      1. Tiers are evaluated in ascending priority order (priority 1 before
      priority 2, etc.)

      2. The first tier where ALL conditions match is selected

      3. If no conditional tiers match, the default tier is used as a fallback

      4. The default tier has priority 0 and no conditions


      Why priorities matter:

      - Lower priority numbers are evaluated first, allowing you to define
      specific cases before general ones

      - Example: Priority 1 for "high usage" (>200K tokens), Priority 2 for
      "medium usage" (>100K tokens), Priority 0 for default

      - Without proper ordering, a less specific condition might match before a
      more specific one


      Every model must have exactly one default tier to ensure cost calculation
      always succeeds.
    properties:
      conditions:
        docs: >
          Array of conditions that must ALL be met for this tier to match (AND
          logic).


          The default tier must have an empty conditions array. Conditional
          tiers should have one or more conditions

          that define when this tier's pricing applies.


          Multiple conditions enable complex matching scenarios (e.g., "high
          input tokens AND low output tokens").
        type: list<PricingTierCondition>
      id:
        docs: Unique identifier for the pricing tier
        type: string
      isDefault:
        docs: >
          Whether this is the default tier. Every model must have exactly one
          default tier with priority 0 and no conditions.


          The default tier serves as a fallback when no conditional tiers match,
          ensuring cost calculation always succeeds.

          It typically represents the base pricing for standard usage patterns.
        type: boolean
      name:
        docs: >
          Name of the pricing tier for display and identification purposes.


          Examples: "Standard", "High Volume Tier", "Large Context", "Extended
          Context Tier"
        type: string
      prices:
        docs: >
          Prices (USD) by usage type for this tier.


          Common usage types: "input", "output", "total", "request", "image"

          Prices are specified in USD per unit (e.g., per token, per request,
          per second).


          Example: {"input": 0.000003, "output": 0.000015} means $3 per million
          input tokens and $15 per million output tokens.
        type: map<string, double>
      priority:
        docs: >
          Priority for tier matching evaluation. Lower numbers = higher priority
          (evaluated first).


          The default tier must always have priority 0. Conditional tiers should
          have priority 1, 2, 3, etc.


          Example ordering:

          - Priority 0: Default tier (no conditions, always matches as fallback)

          - Priority 1: High usage tier (e.g., >200K tokens)

          - Priority 2: Medium usage tier (e.g., >100K tokens)


          This ensures more specific conditions are checked before general ones.
        type: integer
  PricingTierCondition:
    docs: >
      Condition for matching a pricing tier based on usage details. Used to
      implement tiered pricing models where costs vary based on usage
      thresholds.


      How it works:

      1. The regex pattern matches against usage detail keys (e.g.,
      "input_tokens", "input_cached")

      2. Values of all matching keys are summed together

      3. The sum is compared against the threshold value using the specified
      operator

      4. All conditions in a tier must be met (AND logic) for the tier to match


      Common use cases:

      - Threshold-based pricing: Match when accumulated usage exceeds a certain
      amount

      - Usage-type-specific pricing: Different rates for cached vs non-cached
      tokens, or input vs output

      - Volume-based pricing: Different rates based on total request or token
      count
    properties:
      caseSensitive:
        docs: >-
          Whether the regex pattern matching is case-sensitive. Default is false
          (case-insensitive matching).
        type: boolean
      operator:
        docs: >
          Comparison operator to apply between the summed value and the
          threshold.


          - gt: greater than (sum > threshold)

          - gte: greater than or equal (sum >= threshold)

          - lt: less than (sum < threshold)

          - lte: less than or equal (sum <= threshold)

          - eq: equal (sum == threshold)

          - neq: not equal (sum != threshold)
        type: PricingTierOperator
      usageDetailPattern:
        docs: >
          Regex pattern to match against usage detail keys. All matching keys'
          values are summed for threshold comparison.


          Examples:

          - "^input" matches "input", "input_tokens", "input_cached", etc.

          - "^(input|prompt)" matches both "input_tokens" and "prompt_tokens"

          - "_cache$" matches "input_cache", "output_cache", etc.


          The pattern is case-insensitive by default. If no keys match, the sum
          is treated as zero.
        type: string
      value:
        docs: >-
          Threshold value for comparison. For token-based pricing, this is
          typically the token count threshold (e.g., 200000 for a 200K token
          threshold).
        type: double
  PricingTierInput:
    docs: >
      Input schema for creating a pricing tier. The tier ID will be
      automatically generated server-side.


      When creating a model with pricing tiers:

      - Exactly one tier must have isDefault=true (the fallback tier)

      - The default tier must have priority=0 and conditions=[]

      - All tier names and priorities must be unique within the model

      - Each tier must define at least one price


      See PricingTier for detailed information about how tiers work and why
      they're useful.
    properties:
      conditions:
        docs: >
          Array of conditions that must ALL be met for this tier to match (AND
          logic).


          The default tier must have an empty array (conditions=[]).

          Conditional tiers should define one or more conditions that specify
          when this tier's pricing applies.


          Each condition specifies a regex pattern, operator, and threshold
          value for matching against usage details.
        type: list<PricingTierCondition>
      isDefault:
        docs: >
          Whether this is the default tier. Exactly one tier per model must be
          marked as default.


          Requirements for default tier:

          - Must have isDefault=true

          - Must have priority=0

          - Must have empty conditions array (conditions=[])


          The default tier acts as a fallback when no conditional tiers match.
        type: boolean
      name:
        docs: >
          Name of the pricing tier for display and identification purposes.


          Must be unique within the model. Common patterns: "Standard", "High
          Volume Tier", "Extended Context"
        type: string
      prices:
        docs: >
          Prices (USD) by usage type for this tier. At least one price must be
          defined.


          Common usage types: "input", "output", "total", "request", "image"

          Prices are in USD per unit (e.g., per token).


          Example: {"input": 0.000003, "output": 0.000015} represents $3 per
          million input tokens and $15 per million output tokens.
        type: map<string, double>
      priority:
        docs: >
          Priority for tier matching evaluation. Lower numbers = higher priority
          (evaluated first).


          Must be unique within the model. The default tier must have
          priority=0.

          Conditional tiers should use priority 1, 2, 3, etc. based on their
          specificity.
        type: integer
  PricingTierOperator:
    docs: Comparison operators for pricing tier conditions
    enum:
      - gt
      - gte
      - lt
      - lte
      - eq
      - neq
  Score:
    discriminant: dataType
    union:
      BOOLEAN:
        docs: Score with BOOLEAN data type
        type: BooleanScore
      CATEGORICAL:
        docs: Score with CATEGORICAL data type
        type: CategoricalScore
      CORRECTION:
        docs: Score with CORRECTION data type
        type: CorrectionScore
      NUMERIC:
        docs: Score with NUMERIC data type
        type: NumericScore
      TEXT:
        docs: Score with TEXT data type
        type: TextScore
  ScoreConfig:
    docs: Configuration for a score
    properties:
      categories:
        docs: Configures custom categories for categorical scores
        type: optional<list<ConfigCategory>>
      createdAt: datetime
      dataType: ScoreConfigDataType
      description:
        docs: Description of the score config
        type: optional<nullable<string>>
      id: string
      isArchived:
        docs: Whether the score config is archived. Defaults to false
        type: boolean
      maxValue:
        docs: >-
          Sets maximum value for numerical scores. If not set, the maximum value
          defaults to +∞
        type: optional<nullable<double>>
      minValue:
        docs: >-
          Sets minimum value for numerical scores. If not set, the minimum value
          defaults to -∞
        type: optional<nullable<double>>
      name: string
      projectId: string
      updatedAt: datetime
  ScoreConfigDataType:
    enum:
      - NUMERIC
      - BOOLEAN
      - CATEGORICAL
      - TEXT
  ScoreDataType:
    enum:
      - NUMERIC
      - BOOLEAN
      - CATEGORICAL
      - CORRECTION
      - TEXT
  ScoreSource:
    enum:
      - ANNOTATION
      - API
      - EVAL
  ScoreV1:
    discriminant: dataType
    union:
      BOOLEAN:
        docs: Score with BOOLEAN data type
        type: BooleanScoreV1
      CATEGORICAL:
        docs: Score with CATEGORICAL data type
        type: CategoricalScoreV1
      NUMERIC:
        docs: Score with NUMERIC data type
        type: NumericScoreV1
      TEXT:
        docs: Score with TEXT data type
        type: TextScoreV1
  Session:
    properties:
      createdAt: datetime
      environment:
        docs: The environment from which this session originated.
        type: string
      id: string
      projectId: string
  SessionWithTraces:
    extends: Session
    properties:
      traces: list<Trace>
  TextScore:
    extends: BaseScore
    properties:
      stringValue:
        docs: The text content of the score (1-500 characters)
        type: string
  TextScoreV1:
    extends: BaseScoreV1
    properties:
      stringValue:
        docs: The text content of the score (1-500 characters)
        type: string
  Trace:
    properties:
      environment:
        docs: >-
          The environment from which this trace originated. Can be any lowercase
          alphanumeric string with hyphens and underscores that does not start
          with 'langfuse'.
        type: string
      id:
        docs: The unique identifier of a trace
        type: string
      input:
        docs: The input data of the trace. Can be any JSON.
        type: optional<unknown>
      metadata:
        docs: The metadata associated with the trace. Can be any JSON.
        type: optional<unknown>
      name:
        docs: The name of the trace
        type: nullable<string>
      output:
        docs: The output data of the trace. Can be any JSON.
        type: optional<unknown>
      public:
        docs: Public traces are accessible via url without login
        type: boolean
      release:
        docs: The release version of the application when the trace was created
        type: nullable<string>
      sessionId:
        docs: The session identifier associated with the trace
        type: nullable<string>
      tags:
        docs: The tags associated with the trace.
        type: list<string>
      timestamp:
        docs: The timestamp when the trace was created
        type: datetime
      userId:
        docs: The user identifier associated with the trace
        type: nullable<string>
      version:
        docs: The version of the trace
        type: nullable<string>
  TraceWithDetails:
    extends: Trace
    properties:
      htmlPath:
        docs: Path of trace in Langfuse UI
        type: string
      latency:
        docs: Latency of trace in seconds
        type: optional<nullable<double>>
      observations:
        docs: List of observation ids
        type: optional<nullable<list<string>>>
      scores:
        docs: List of score ids
        type: optional<nullable<list<string>>>
      totalCost:
        docs: Cost of trace in USD
        type: optional<nullable<double>>
  TraceWithFullDetails:
    extends: Trace
    properties:
      htmlPath:
        docs: Path of trace in Langfuse UI
        type: string
      latency:
        docs: Latency of trace in seconds
        type: optional<nullable<double>>
      observations:
        docs: List of observations
        type: list<ObservationsView>
      scores:
        docs: List of scores
        type: list<ScoreV1>
      totalCost:
        docs: Cost of trace in USD
        type: optional<nullable<double>>
  Usage:
    docs: >-
      (Deprecated. Use usageDetails and costDetails instead.) Standard interface
      for usage and cost
    properties:
      input:
        docs: Number of input units (e.g. tokens)
        type: integer
      inputCost:
        docs: USD input cost
        type: optional<double>
      output:
        docs: Number of output units (e.g. tokens)
        type: integer
      outputCost:
        docs: USD output cost
        type: optional<double>
      total:
        docs: Defaults to input+output if not set
        type: integer
      totalCost:
        docs: USD total cost, defaults to input+output
        type: optional<double>
      unit:
        docs: Unit of measurement
        type: nullable<string>
errors:
  AccessDeniedError:
    status-code: 403
    type: unknown
  Error:
    status-code: 400
    type: unknown
  MethodNotAllowedError:
    status-code: 405
    type: unknown
  NotFoundError:
    status-code: 404
    type: unknown
  UnauthorizedError:
    status-code: 401
    type: unknown
