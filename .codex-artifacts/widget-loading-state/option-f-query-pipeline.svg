<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgF" x1="0" y1="0" x2="1400" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050A12"/>
      <stop offset="1" stop-color="#0F1829"/>
    </linearGradient>
    <linearGradient id="cardF" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07101C"/>
      <stop offset="1" stop-color="#0A1321"/>
    </linearGradient>
    <linearGradient id="railF" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0C1727"/>
      <stop offset="1" stop-color="#09111B"/>
    </linearGradient>
    <linearGradient id="progressF" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#A4B6FF"/>
      <stop offset="1" stop-color="#E2E8FF"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="920" fill="url(#bgF)"/>
  <text x="64" y="72" fill="#E7EEF9" font-size="32" font-family="Arial, sans-serif" font-weight="700">Option F: Query Pipeline</text>
  <text x="64" y="106" fill="#8FA3C3" font-size="19" font-family="Arial, sans-serif">Visualize the execution stages directly: plan, scan, aggregate, render. This is the most “engineer explainability” oriented direction.</text>

  <rect x="64" y="152" width="860" height="700" rx="22" fill="url(#cardF)" stroke="#2E476B" stroke-width="2"/>
  <text x="104" y="220" fill="#DCE6F5" font-size="30" font-family="Arial, sans-serif" font-weight="700">Top 20 Use Cases (Trace) by Cost</text>
  <text x="104" y="258" fill="#8FA2C2" font-size="20" font-family="Arial, sans-serif">Aggregated model cost by trace.name over the selected period</text>

  <rect x="104" y="298" width="240" height="492" rx="18" fill="url(#railF)" stroke="#253A59"/>
  <text x="132" y="334" fill="#7E96B6" font-size="12" font-family="SFMono-Regular, Menlo, Monaco, monospace">EXECUTION PIPELINE</text>

  <circle cx="144" cy="386" r="10" fill="#5E7190"/>
  <text x="168" y="391" fill="#A9BAD0" font-size="18" font-family="Arial, sans-serif" font-weight="700">Plan query</text>
  <text x="168" y="414" fill="#6F88A9" font-size="14" font-family="Arial, sans-serif">Compiled dimensions and filters</text>

  <rect x="138" y="442" width="4" height="80" rx="2" fill="#25384F"/>
  <circle cx="144" cy="544" r="12" fill="#A6B8FF"/>
  <circle cx="144" cy="544" r="24" fill="#A6B8FF" fill-opacity="0.16"/>
  <text x="168" y="549" fill="#EDF2FF" font-size="20" font-family="Arial, sans-serif" font-weight="700">Scan rows</text>
  <text x="168" y="572" fill="#8FA3C3" font-size="14" font-family="Arial, sans-serif">1.779B / 2.925B rows • 13.4M rows/s</text>
  <rect x="168" y="588" width="138" height="6" rx="3" fill="#172233"/>
  <rect x="168" y="588" width="84" height="6" rx="3" fill="url(#progressF)"/>

  <rect x="138" y="622" width="4" height="44" rx="2" fill="#25384F"/>
  <circle cx="144" cy="688" r="10" fill="#324863"/>
  <text x="168" y="693" fill="#A9BAD0" font-size="18" font-family="Arial, sans-serif" font-weight="700">Aggregate result</text>
  <text x="168" y="716" fill="#6F88A9" font-size="14" font-family="Arial, sans-serif">Waiting for scan completion</text>

  <rect x="138" y="734" width="4" height="28" rx="2" fill="#25384F"/>
  <circle cx="144" cy="780" r="10" fill="#324863"/>
  <text x="168" y="785" fill="#A9BAD0" font-size="18" font-family="Arial, sans-serif" font-weight="700">Render chart</text>

  <g opacity="0.26">
    <rect x="390" y="334" width="470" height="1" fill="#637D9D"/>
    <rect x="390" y="430" width="470" height="1" fill="#637D9D"/>
    <rect x="390" y="526" width="470" height="1" fill="#637D9D"/>
    <rect x="390" y="622" width="470" height="1" fill="#637D9D"/>
  </g>
  <g opacity="0.38">
    <path d="M414 666 L474 596 L534 608 L594 506 L654 532 L714 410 L774 382 L834 316" stroke="#5B73AB" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="414" cy="666" r="6" fill="#D0D9FF"/>
    <circle cx="594" cy="506" r="6" fill="#D0D9FF"/>
    <circle cx="834" cy="316" r="6" fill="#D0D9FF"/>
  </g>

  <rect x="390" y="702" width="470" height="68" rx="14" fill="#0B1320" stroke="#223650"/>
  <text x="414" y="728" fill="#7E96B6" font-size="11" font-family="SFMono-Regular, Menlo, Monaco, monospace">DIAGNOSTIC</text>
  <text x="414" y="752" fill="#ECF4FB" font-size="18" font-family="Arial, sans-serif" font-weight="700">Long-running scan</text>
  <text x="584" y="752" fill="#93A8C6" font-size="15" font-family="Arial, sans-serif">Try narrowing time range or filtering high-cardinality segments.</text>

  <rect x="974" y="210" width="334" height="286" rx="20" fill="url(#cardF)" stroke="#2E476B" stroke-width="2"/>
  <text x="1002" y="256" fill="#DCE6F5" font-size="22" font-family="Arial, sans-serif" font-weight="700">Total Count Traces</text>
  <text x="1002" y="284" fill="#8FA2C2" font-size="16" font-family="Arial, sans-serif">Shows the count of traces</text>

  <rect x="996" y="328" width="290" height="118" rx="16" fill="url(#railF)" stroke="#253A59"/>
  <text x="1018" y="354" fill="#7E96B6" font-size="11" font-family="SFMono-Regular, Menlo, Monaco, monospace">PIPELINE</text>
  <text x="1018" y="378" fill="#A9BAD0" font-size="15" font-family="Arial, sans-serif">Plan</text>
  <text x="1082" y="378" fill="#A9BAD0" font-size="15" font-family="Arial, sans-serif">Scan</text>
  <text x="1158" y="378" fill="#637A9A" font-size="15" font-family="Arial, sans-serif">Aggregate</text>
  <circle cx="1070" cy="402" r="8" fill="#A6B8FF"/>
  <rect x="1086" y="398" width="164" height="6" rx="3" fill="#172233"/>
  <rect x="1086" y="398" width="100" height="6" rx="3" fill="url(#progressF)"/>
  <text x="1018" y="426" fill="#93A8C6" font-size="12" font-family="Arial, sans-serif">Scanning rows • 61%</text>

  <text x="974" y="542" fill="#E7EEF9" font-size="18" font-family="Arial, sans-serif" font-weight="700">Why it feels devtooling-native</text>
  <text x="974" y="574" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">It explains where time is being spent, not just that we are “loading”.</text>
  <text x="974" y="604" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">Great for advanced users who care about execution stages.</text>
  <text x="974" y="634" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">Slightly more opinionated, but the most technically legible.</text>
</svg>
