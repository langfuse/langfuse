<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="1400" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070C14"/>
      <stop offset="1" stop-color="#0D1626"/>
    </linearGradient>
    <linearGradient id="cardL" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#07111E"/>
      <stop offset="1" stop-color="#0A1321"/>
    </linearGradient>
    <linearGradient id="progressL" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#A8B7FF"/>
      <stop offset="1" stop-color="#E4E8FF"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="920" fill="url(#bgL)"/>
  <text x="64" y="72" fill="#E7EEF9" font-size="32" font-family="Arial, sans-serif" font-weight="700">Option L: Centered Minimal</text>
  <text x="64" y="106" fill="#8EA4C6" font-size="19" font-family="Arial, sans-serif">Only the three required elements in the middle. Best when the chart is not useful until data returns.</text>

  <rect x="64" y="156" width="860" height="700" rx="22" fill="url(#cardL)" stroke="#2E476B" stroke-width="2"/>
  <text x="104" y="222" fill="#DCE6F5" font-size="30" font-family="Arial, sans-serif" font-weight="700">Top 20 Use Cases (Trace) by Cost</text>
  <text x="104" y="260" fill="#8EA4C6" font-size="20" font-family="Arial, sans-serif">Aggregated model cost by trace.name over the selected period</text>

  <circle cx="494" cy="478" r="12" fill="#0F2036" stroke="#6B7DE1"/>
  <path d="M494 468 A10 10 0 0 1 504 478" stroke="#D6DBFF" stroke-width="2.5" stroke-linecap="round"/>
  <text x="494" y="520" text-anchor="middle" fill="#ECF4FB" font-size="20" font-family="Arial, sans-serif" font-weight="700">Running query…</text>
  <rect x="332" y="544" width="324" height="8" rx="4" fill="#162232"/>
  <rect x="332" y="544" width="198" height="8" rx="4" fill="url(#progressL)"/>
  <text x="494" y="582" text-anchor="middle" fill="#93A8C6" font-size="15" font-family="Arial, sans-serif">Reading 1.779B / ~2.925B rows</text>
  <text x="494" y="610" text-anchor="middle" fill="#93A8C6" font-size="14" font-family="Arial, sans-serif">This query is taking longer than usual.</text>

  <rect x="974" y="210" width="334" height="286" rx="20" fill="url(#cardL)" stroke="#2E476B" stroke-width="2"/>
  <text x="1002" y="256" fill="#DCE6F5" font-size="22" font-family="Arial, sans-serif" font-weight="700">Total Count Traces</text>
  <text x="1002" y="284" fill="#8EA4C6" font-size="16" font-family="Arial, sans-serif">Shows the count of traces</text>
  <circle cx="1140" cy="364" r="8" fill="#0F2036" stroke="#6B7DE1"/>
  <path d="M1140 357 A7 7 0 0 1 1147 364" stroke="#D6DBFF" stroke-width="2" stroke-linecap="round"/>
  <rect x="1064" y="386" width="152" height="6" rx="3" fill="#162232"/>
  <rect x="1064" y="386" width="92" height="6" rx="3" fill="url(#progressL)"/>
  <text x="1140" y="416" text-anchor="middle" fill="#93A8C6" font-size="12" font-family="Arial, sans-serif">Running query…</text>

  <text x="974" y="542" fill="#E7EEF9" font-size="18" font-family="Arial, sans-serif" font-weight="700">Default behavior</text>
  <text x="974" y="574" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">0s: spinner + progress</text>
  <text x="974" y="604" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">3s: warning text appears below</text>
  <text x="974" y="634" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">Clear, but weaker for cramped widgets</text>
</svg>
