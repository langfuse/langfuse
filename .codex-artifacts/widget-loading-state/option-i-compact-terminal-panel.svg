  </defs>

  <rect width="1400" height="920" fill="url(#bgI)"/>
  <text x="64" y="72" fill="#E7EEF9" font-size="32" font-family="Arial, sans-serif" font-weight="700">Option I: Compact Terminal Panel</text>
  <text x="64" y="106" fill="#8FA3C3" font-size="19" font-family="Arial, sans-serif">A very small terminal-like panel sits inside the chart area. Still simple, but more explicit than a status strip.</text>

  <rect x="64" y="152" width="860" height="700" rx="22" fill="url(#cardI)" stroke="#2F486C" stroke-width="2"/>
  <text x="104" y="220" fill="#DCE6F5" font-size="30" font-family="Arial, sans-serif" font-weight="700">Top 20 Use Cases (Trace) by Cost</text>
  <text x="104" y="258" fill="#8FA2C2" font-size="20" font-family="Arial, sans-serif">Aggregated model cost by trace.name over the selected period</text>

  <g opacity="0.24">
    <rect x="120" y="332" width="690" height="1" fill="#627C9D"/>
