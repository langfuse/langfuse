  <rect x="262" y="548" width="462" height="120" rx="16" fill="#0C1727" stroke="#263C5A"/>
  <circle cx="288" cy="574" r="4" fill="#F87171"/>
  <circle cx="304" cy="574" r="4" fill="#FBBF24"/>
  <circle cx="320" cy="574" r="4" fill="#34D399"/>
  <text x="342" y="578" fill="#7E96B6" font-size="11" font-family="SFMono-Regular, Menlo, Monaco, monospace">query-runtime</text>
  <text x="288" y="612" fill="#ECF4FB" font-size="15" font-family="SFMono-Regular, Menlo, Monaco, monospace">&gt; phase: scanning_rows</text>
  <text x="288" y="638" fill="#93A8C6" font-size="14" font-family="SFMono-Regular, Menlo, Monaco, monospace">&gt; rows: 1.779B / 2.925B   rate: 13.4M/s   progress: 61%</text>
  <rect x="288" y="650" width="410" height="8" rx="4" fill="#142031"/>
