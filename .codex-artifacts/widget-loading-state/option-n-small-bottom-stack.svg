  <text x="152" y="546" fill="#93A8C6" font-size="14" font-family="Arial, sans-serif">Reading 1.736B / ~2.925B rows</text>
  <text x="152" y="572" fill="#566A87" font-size="14" font-family="Arial, sans-serif">Recommendation line reserved</text>

  <rect x="734" y="176" width="470" height="430" rx="22" fill="url(#cardN2)" stroke="#2E476B" stroke-width="2"/>
  <text x="766" y="230" fill="#DCE6F5" font-size="24" font-family="Arial, sans-serif" font-weight="700">Total Count Traces</text>
