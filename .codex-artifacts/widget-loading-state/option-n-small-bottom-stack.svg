  <text x="56" y="66" fill="#E7EEF9" font-size="30" font-family="Arial, sans-serif" font-weight="700">Option N: Reserved Bottom Stack</text>
  <text x="56" y="98" fill="#8EA3C4" font-size="18" font-family="Arial, sans-serif">Best small-widget pattern: reserve a dedicated bottom status zone. The chart never overlaps it, and the recommendation gets its own line.</text>

