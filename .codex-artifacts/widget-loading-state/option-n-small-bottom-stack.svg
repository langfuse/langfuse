  <text x="120" y="654" fill="#E7EEF9" font-size="18" font-family="Arial, sans-serif" font-weight="700">Why it works</text>
  <text x="120" y="686" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">The status area has fixed height, so nothing overlays or jumps.</text>
  <text x="120" y="716" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">This is the safest small-widget solution.</text>
