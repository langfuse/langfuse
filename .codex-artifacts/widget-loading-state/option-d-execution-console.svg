<svg width="1400" height="920" viewBox="0 0 1400 920" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="1400" y2="920" gradientUnits="userSpaceOnUse">
      <stop stop-color="#060B14"/>
      <stop offset="1" stop-color="#0D1626"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#071120"/>
      <stop offset="1" stop-color="#0A1322"/>
    </linearGradient>
    <linearGradient id="panelD" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0C1727"/>
      <stop offset="1" stop-color="#09111C"/>
    </linearGradient>
    <linearGradient id="progressD" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#7FD3FF"/>
      <stop offset="1" stop-color="#D4F1FF"/>
    </linearGradient>
    <filter id="softD" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1400" height="920" fill="url(#bgD)"/>
  <text x="64" y="72" fill="#E7EEF9" font-size="32" font-family="Arial, sans-serif" font-weight="700">Option D: Execution Console</text>
  <text x="64" y="106" fill="#8FA3C3" font-size="19" font-family="Arial, sans-serif">Treat the widget like a running query: explicit phase, elapsed time, throughput, and progress in a compact operator console.</text>

  <rect x="64" y="152" width="860" height="700" rx="22" fill="url(#cardD)" stroke="#2E476B" stroke-width="2"/>
  <text x="104" y="220" fill="#DCE6F5" font-size="30" font-family="Arial, sans-serif" font-weight="700">Top 20 Use Cases (Trace) by Cost</text>
  <text x="104" y="258" fill="#8FA2C2" font-size="20" font-family="Arial, sans-serif">Aggregated model cost by trace.name over the selected period</text>

  <rect x="722" y="188" width="156" height="30" rx="15" fill="#11243A" stroke="#315175"/>
  <circle cx="746" cy="203" r="4" fill="#5FD1FF"/>
  <text x="764" y="208" fill="#D7E9F8" font-size="13" font-family="SFMono-Regular, Menlo, Monaco, monospace" font-weight="700">QUERY EXECUTING</text>

  <g opacity="0.38">
    <path d="M120 610 C190 594 268 570 334 530 C418 478 500 430 592 398 C662 374 732 352 810 316" stroke="#29486C" stroke-width="3"/>
    <path d="M120 654 C214 632 294 608 386 558 C468 514 548 486 636 438 C700 402 754 370 810 340" stroke="#355A84" stroke-width="6" stroke-linecap="round"/>
    <path d="M120 688 C210 682 278 672 356 644 C462 604 548 544 646 516 C718 494 770 476 810 464" stroke="#213550" stroke-width="3" stroke-linecap="round"/>
    <circle cx="386" cy="558" r="6" fill="#8ED8FF"/>
    <circle cx="636" cy="438" r="6" fill="#8ED8FF"/>
    <circle cx="810" cy="340" r="6" fill="#8ED8FF"/>
  </g>

  <g opacity="0.14">
    <rect x="120" y="332" width="690" height="1" fill="#6D86A5"/>
    <rect x="120" y="418" width="690" height="1" fill="#6D86A5"/>
    <rect x="120" y="504" width="690" height="1" fill="#6D86A5"/>
    <rect x="120" y="590" width="690" height="1" fill="#6D86A5"/>
    <rect x="120" y="676" width="690" height="1" fill="#6D86A5"/>
  </g>

  <rect x="96" y="704" width="796" height="120" rx="18" fill="url(#panelD)" stroke="#283D5B"/>
  <rect x="122" y="726" width="744" height="6" rx="3" fill="#152132"/>
  <rect x="122" y="726" width="454" height="6" rx="3" fill="url(#progressD)"/>

  <text x="122" y="762" fill="#7E96B6" font-size="12" font-family="SFMono-Regular, Menlo, Monaco, monospace">PHASE</text>
  <text x="122" y="790" fill="#EBF3FB" font-size="20" font-family="Arial, sans-serif" font-weight="700">Scanning rows</text>

  <text x="316" y="762" fill="#7E96B6" font-size="12" font-family="SFMono-Regular, Menlo, Monaco, monospace">PROGRESS</text>
  <text x="316" y="790" fill="#EBF3FB" font-size="20" font-family="Arial, sans-serif" font-weight="700">1.779B / 2.925B</text>

  <text x="544" y="762" fill="#7E96B6" font-size="12" font-family="SFMono-Regular, Menlo, Monaco, monospace">THROUGHPUT</text>
  <text x="544" y="790" fill="#EBF3FB" font-size="20" font-family="Arial, sans-serif" font-weight="700">13.4M rows/s</text>

  <text x="736" y="762" fill="#7E96B6" font-size="12" font-family="SFMono-Regular, Menlo, Monaco, monospace">ELAPSED</text>
  <text x="736" y="790" fill="#EBF3FB" font-size="20" font-family="Arial, sans-serif" font-weight="700">24.6s</text>

  <text x="122" y="814" fill="#93A8C6" font-size="15" font-family="Arial, sans-serif">Long-running query. Try narrowing the time window or adding more selective filters.</text>

  <rect x="974" y="210" width="334" height="286" rx="20" fill="url(#cardD)" stroke="#2E476B" stroke-width="2"/>
  <text x="1002" y="256" fill="#DCE6F5" font-size="22" font-family="Arial, sans-serif" font-weight="700">Total Count Traces</text>
  <text x="1002" y="284" fill="#8FA2C2" font-size="16" font-family="Arial, sans-serif">Shows the count of traces</text>

  <rect x="996" y="322" width="290" height="120" rx="16" fill="url(#panelD)" stroke="#283D5B"/>
  <rect x="1018" y="340" width="246" height="5" rx="2.5" fill="#152132"/>
  <rect x="1018" y="340" width="149" height="5" rx="2.5" fill="url(#progressD)"/>
  <text x="1018" y="366" fill="#7E96B6" font-size="11" font-family="SFMono-Regular, Menlo, Monaco, monospace">PHASE</text>
  <text x="1018" y="387" fill="#EBF3FB" font-size="17" font-family="Arial, sans-serif" font-weight="700">Scanning rows</text>
  <text x="1190" y="387" text-anchor="end" fill="#EBF3FB" font-size="17" font-family="Arial, sans-serif" font-weight="700">61%</text>
  <text x="1018" y="414" fill="#93A8C6" font-size="13" font-family="Arial, sans-serif">1.736B / 2.925B rows</text>

  <text x="974" y="542" fill="#E7EEF9" font-size="18" font-family="Arial, sans-serif" font-weight="700">Why it feels devtooling-native</text>
  <text x="974" y="574" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">The hierarchy reads like a profiler, not a generic loading spinner.</text>
  <text x="974" y="604" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">Engineers get fast answers: phase, volume, throughput, elapsed.</text>
  <text x="974" y="634" fill="#93A8C6" font-size="16" font-family="Arial, sans-serif">Small widgets degrade to the same console model without overlap.</text>
</svg>
