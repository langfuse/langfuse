<svg xmlns="http://www.w3.org/2000/svg" width="760" height="400" viewBox="0 0 760 400" font-family="system-ui,Segoe UI,Helvetica,Arial,sans-serif">
  <rect width="760" height="400" fill="#ffffff"/>
  <text x="30" y="26" font-size="16" font-weight="600" fill="#111">CI/CD merge-group runtime — week 2026-W28 (seconds)</text>
  <text x="30" y="44" font-size="11" fill="#666">One sampled merge-group run per active day. Blue = perceived (wall) time, Green = execution time (excl. runner wait).</text>

  <!-- Y gridlines and labels -->
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="70" y1="320" x2="720" y2="320"/>
    <line x1="70" y1="250" x2="720" y2="250"/>
    <line x1="70" y1="180" x2="720" y2="180"/>
    <line x1="70" y1="110" x2="720" y2="110"/>
    <line x1="70" y1="40"  x2="720" y2="40"/>
  </g>
  <g font-size="10" fill="#666" text-anchor="end">
    <text x="62" y="324">0</text>
    <text x="62" y="254">150</text>
    <text x="62" y="184">300</text>
    <text x="62" y="114">450</text>
    <text x="62" y="44">600</text>
  </g>

  <!-- Axes -->
  <line x1="70" y1="40" x2="70" y2="320" stroke="#9ca3af" stroke-width="1.5"/>
  <line x1="70" y1="320" x2="720" y2="320" stroke="#9ca3af" stroke-width="1.5"/>

  <!-- X labels -->
  <g font-size="10" fill="#666" text-anchor="middle">
    <text x="70"  y="338">06-30</text>
    <text x="200" y="338">07-01</text>
    <text x="330" y="338">07-02</text>
    <text x="460" y="338">07-03</text>
    <text x="590" y="338">07-06</text>
    <text x="720" y="338">07-07</text>
  </g>

  <!-- Perceived (blue) -->
  <polyline fill="none" stroke="#2563eb" stroke-width="2"
    points="70,158.5 200,146.4 330,50.3 460,123.1 590,110.5 720,86.2"/>
  <g fill="#2563eb">
    <circle cx="70"  cy="158.5" r="3"/>
    <circle cx="200" cy="146.4" r="3"/>
    <circle cx="330" cy="50.3"  r="3"/>
    <circle cx="460" cy="123.1" r="3"/>
    <circle cx="590" cy="110.5" r="3"/>
    <circle cx="720" cy="86.2"  r="3"/>
  </g>

  <!-- Execution (green) -->
  <polyline fill="none" stroke="#16a34a" stroke-width="2"
    points="70,167.4 200,201.9 330,131.9 460,133.3 590,120.7 720,89.5"/>
  <g fill="#16a34a">
    <circle cx="70"  cy="167.4" r="3"/>
    <circle cx="200" cy="201.9" r="3"/>
    <circle cx="330" cy="131.9" r="3"/>
    <circle cx="460" cy="133.3" r="3"/>
    <circle cx="590" cy="120.7" r="3"/>
    <circle cx="720" cy="89.5"  r="3"/>
  </g>

  <!-- Legend -->
  <g font-size="11">
    <rect x="500" y="356" width="14" height="3" fill="#2563eb"/>
    <text x="520" y="360" fill="#111">perceived (wall)</text>
    <rect x="630" y="356" width="14" height="3" fill="#16a34a"/>
    <text x="650" y="360" fill="#111">execution</text>
  </g>
</svg>
