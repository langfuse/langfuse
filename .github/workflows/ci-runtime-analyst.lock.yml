          {{#if github.run_id}}
          - **workflow-run-id**: __GH_AW_GITHUB_RUN_ID__
          {{/if}}
          - **checkouts**: The following repositories have been checked out and are available in the workspace:
            - repo `__GH_AW_GITHUB_REPOSITORY__` → `$GITHUB_WORKSPACE` (cwd) [full history, all branches available as remote-tracking refs] [additional refs fetched: ci-perf/*]
            - **Note**: If a branch you need is not in the list above and is not listed as an additional fetched ref, it has NOT been checked out. For private repositories you cannot fetch it. If the branch is required and not available, exit with an error and ask the user to add it to the `fetch:` option of the `checkout:` configuration (e.g., `fetch: ["refs/pulls/open/*"]` for all open PR refs, or `fetch: ["main", "feature/my-branch"]` for specific branches).
            - **Warning: No git credentials are available to the agent.** Credentials are
              intentionally removed after the checkout step for security. This means any git
              operation that needs to authenticate to the remote will fail. In private repositories, that includes:
              - `git fetch`, `git pull`, `git clone`, and `git push` (direct push, not via safe-output tools)
              - Checking out or switching to a remote branch that is not already fetched
              - Deepening a shallow clone (`git fetch --unshallow`)
              - On-demand blob fetches in partial/blobless clones (operations on files not in the initial checkout)
              Do NOT attempt to configure credentials, run `git credential fill`, or modify `.gitconfig` —
              authentication will not succeed. If you encounter credential prompts or authentication errors,
              stop immediately and report the limitation rather than spending turns trying to work around it.
          </github-context>
          
          GH_AW_PROMPT_42fffef78a574439_EOF
          cat "${RUNNER_TEMP}/gh-aw/prompts/github_mcp_tools_with_safeoutputs_prompt.md"
          cat << 'GH_AW_PROMPT_42fffef78a574439_EOF'
          </system>
          {{#runtime-import .github/workflows/ci-runtime-analyst.md}}
          GH_AW_PROMPT_42fffef78a574439_EOF
          } > "$GH_AW_PROMPT"
      - name: Interpolate variables and render templates
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
          GH_AW_ENGINE_ID: "claude"
          GH_AW_GITHUB_EVENT_NAME: ${{ github.event_name }}
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/interpolate_prompt.cjs');
            await main();
      - name: Substitute placeholders
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
          GH_AW_EXPR_1A3A194A: ${{ github.event.discussion.number || (fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').item_type == 'discussion' && fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').item_number) }}
          GH_AW_EXPR_463A214A: ${{ github.event.pull_request.number || (fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').item_type == 'pull_request' && fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').item_number) }}
          GH_AW_EXPR_802A9F6A: ${{ github.event.issue.number || (fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').item_type == 'issue' && fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').item_number) }}
          GH_AW_EXPR_FF1D34CE: ${{ github.event.comment.id || fromJSON(github.event.inputs.aw_context || github.event.client_payload.aw_context || '{}').comment_id }}
          GH_AW_GITHUB_ACTOR: ${{ github.actor }}
          GH_AW_GITHUB_EVENT_NAME: ${{ github.event_name }}
          GH_AW_GITHUB_REPOSITORY: ${{ github.repository }}
          GH_AW_GITHUB_RUN_ID: ${{ github.run_id }}
          GH_AW_GITHUB_WORKSPACE: ${{ github.workspace }}
          GH_AW_MCP_CLI_SERVERS_LIST: '- `safeoutputs` — run `safeoutputs --help` to see available tools'
          GH_AW_MEMORY_BRANCH_NAME: 'memory/ci-runtime-analysis'
          GH_AW_MEMORY_CONSTRAINTS: "\n\n**Constraints:**\n- **Max File Size**: 524288 bytes (0.50 MB) per file\n- **Max File Count**: 300 files per commit\n- **Max Patch Size**: 524288 bytes (512 KB) total per push (max: 1024 KB)\n"
          GH_AW_MEMORY_DESCRIPTION: ' CI runtime history, PR ledger, and durable analysis notes'
          GH_AW_MEMORY_DIR: '/tmp/gh-aw/repo-memory/default/'
          GH_AW_MEMORY_TARGET_REPO: ' of the current repository'
          GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ACTIVATED: ${{ needs.pre_activation.outputs.activated }}
          GH_AW_WIKI_NOTE: ''
        with:
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            
            const substitutePlaceholders = require('${{ runner.temp }}/gh-aw/actions/substitute_placeholders.cjs');
            
            // Call the substitution function
            return await substitutePlaceholders({
              file: process.env.GH_AW_PROMPT,
              substitutions: {
                GH_AW_EXPR_1A3A194A: process.env.GH_AW_EXPR_1A3A194A,
                GH_AW_EXPR_463A214A: process.env.GH_AW_EXPR_463A214A,
                GH_AW_EXPR_802A9F6A: process.env.GH_AW_EXPR_802A9F6A,
                GH_AW_EXPR_FF1D34CE: process.env.GH_AW_EXPR_FF1D34CE,
                GH_AW_GITHUB_ACTOR: process.env.GH_AW_GITHUB_ACTOR,
                GH_AW_GITHUB_EVENT_NAME: process.env.GH_AW_GITHUB_EVENT_NAME,
                GH_AW_GITHUB_REPOSITORY: process.env.GH_AW_GITHUB_REPOSITORY,
                GH_AW_GITHUB_RUN_ID: process.env.GH_AW_GITHUB_RUN_ID,
                GH_AW_GITHUB_WORKSPACE: process.env.GH_AW_GITHUB_WORKSPACE,
                GH_AW_MCP_CLI_SERVERS_LIST: process.env.GH_AW_MCP_CLI_SERVERS_LIST,
                GH_AW_MEMORY_BRANCH_NAME: process.env.GH_AW_MEMORY_BRANCH_NAME,
                GH_AW_MEMORY_CONSTRAINTS: process.env.GH_AW_MEMORY_CONSTRAINTS,
                GH_AW_MEMORY_DESCRIPTION: process.env.GH_AW_MEMORY_DESCRIPTION,
                GH_AW_MEMORY_DIR: process.env.GH_AW_MEMORY_DIR,
                GH_AW_MEMORY_TARGET_REPO: process.env.GH_AW_MEMORY_TARGET_REPO,
                GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ACTIVATED: process.env.GH_AW_NEEDS_PRE_ACTIVATION_OUTPUTS_ACTIVATED,
                GH_AW_WIKI_NOTE: process.env.GH_AW_WIKI_NOTE
              }
            });
      - name: Validate prompt placeholders
        env:
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        # poutine:ignore untrusted_checkout_exec
        run: bash "${RUNNER_TEMP}/gh-aw/actions/validate_prompt_placeholders.sh"
      - name: Print prompt
        env:
          GH_AW_PROMPT: /tmp/gh-aw/aw-prompts/prompt.txt
        # poutine:ignore untrusted_checkout_exec
        run: bash "${RUNNER_TEMP}/gh-aw/actions/print_prompt_summary.sh"
      - name: Upload activation artifact
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: activation
          include-hidden-files: true
          path: |
            /tmp/gh-aw/aw_info.json
            /tmp/gh-aw/models.json
            /tmp/gh-aw/aw-prompts/prompt.txt
            /tmp/gh-aw/aw-prompts/prompt-template.txt
            /tmp/gh-aw/aw-prompts/prompt-import-tree.json
            /tmp/gh-aw/github_rate_limits.jsonl
            /tmp/gh-aw/base
            /tmp/gh-aw/.claude/agents
            /tmp/gh-aw/.claude/skills
          if-no-files-found: ignore
          retention-days: 1

  agent:
    needs: activation
    if: needs.activation.outputs.daily_ai_credits_exceeded != 'true'
    runs-on: ubuntu-latest
    environment: github-agent-workflows
    permissions:
      actions: read
      contents: read
      pull-requests: read
    concurrency:
      group: "gh-aw-claude-${{ github.workflow }}"
      queue: max
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
      GH_AW_ASSETS_ALLOWED_EXTS: ""
      GH_AW_ASSETS_BRANCH: ""
      GH_AW_ASSETS_MAX_SIZE_KB: 0
      GH_AW_MCP_LOG_DIR: /tmp/gh-aw/mcp-logs/safeoutputs
      GH_AW_RUNTIME_FEATURES: ${{ vars.GH_AW_RUNTIME_FEATURES }}
      GH_AW_WORKFLOW_ID_SANITIZED: ciruntimeanalyst
    outputs:
      agentic_engine_timeout: ${{ steps.detect-agent-errors.outputs.agentic_engine_timeout || 'false' }}
      ai_credits_rate_limit_error: ${{ steps.parse-mcp-gateway.outputs.ai_credits_rate_limit_error || 'false' }}
      aic: ${{ steps.parse-mcp-gateway.outputs.aic }}
      ambient_context: ${{ steps.parse-mcp-gateway.outputs.ambient_context }}
      checkout_pr_success: ${{ steps.checkout-pr.outputs.checkout_pr_success || 'true' }}
      effective_tokens: ${{ steps.parse-mcp-gateway.outputs.effective_tokens }}
      has_patch: ${{ steps.collect_output.outputs.has_patch }}
      http_400_response_error: ${{ steps.detect-agent-errors.outputs.http_400_response_error || 'false' }}
      inference_access_error: ${{ steps.detect-agent-errors.outputs.inference_access_error || 'false' }}
      mcp_policy_error: ${{ steps.detect-agent-errors.outputs.mcp_policy_error || 'false' }}
      model: ${{ needs.activation.outputs.model }}
      model_not_supported_error: ${{ steps.detect-agent-errors.outputs.model_not_supported_error || 'false' }}
      output: ${{ steps.collect_output.outputs.output }}
      output_types: ${{ steps.collect_output.outputs.output_types }}
      setup-parent-span-id: ${{ steps.setup.outputs.parent-span-id || steps.setup.outputs.span-id }}
      setup-span-id: ${{ steps.setup.outputs.span-id }}
      setup-trace-id: ${{ steps.setup.outputs.trace-id }}
      unknown_model_ai_credits: ${{ steps.parse-mcp-gateway.outputs.unknown_model_ai_credits || 'false' }}
    steps:
      - name: Setup Scripts
        id: setup
        uses: github/gh-aw-actions/setup@2ad2a516e432f0a0000cfaed33d262a380f9e58f # v0.82.0
        with:
          destination: ${{ runner.temp }}/gh-aw/actions
          job-name: ${{ github.job }}
          trace-id: ${{ needs.activation.outputs.setup-trace-id }}
          parent-span-id: ${{ needs.activation.outputs.setup-parent-span-id || needs.activation.outputs.setup-span-id }}
        env:
          GH_AW_SETUP_WORKFLOW_NAME: "Weekly CI runtime analyst"
          GH_AW_CURRENT_WORKFLOW_REF: ${{ github.repository }}/.github/workflows/ci-runtime-analyst.lock.yml@${{ github.ref }}
          GH_AW_INFO_VERSION: "2.1.195"
          GH_AW_INFO_AWF_VERSION: "v0.27.13"
          GH_AW_INFO_ENGINE_ID: "claude"
      - name: Set runtime paths
        id: set-runtime-paths
        run: |
          {
            echo "GH_AW_SAFE_OUTPUTS=${RUNNER_TEMP}/gh-aw/safeoutputs/outputs.jsonl"
            echo "GH_AW_SAFE_OUTPUTS_CONFIG_PATH=${RUNNER_TEMP}/gh-aw/safeoutputs/config.json"
            echo "GH_AW_SAFE_OUTPUTS_TOOLS_PATH=${RUNNER_TEMP}/gh-aw/safeoutputs/tools.json"
          } >> "$GITHUB_OUTPUT"
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Fetch additional refs
        env:
          GH_AW_FETCH_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN || secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          header=$(printf "x-access-token:%s" "${GH_AW_FETCH_TOKEN}" | base64 -w 0)
          git -c "http.extraheader=Authorization: Basic ${header}" fetch origin '+refs/heads/ci-perf/*:refs/remotes/origin/ci-perf/*'
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Create gh-aw temp directory
        run: bash "${RUNNER_TEMP}/gh-aw/actions/create_gh_aw_tmp_dir.sh"
      - name: Configure gh CLI for GitHub Enterprise
        run: bash "${RUNNER_TEMP}/gh-aw/actions/configure_gh_for_ghe.sh"
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Setup pnpm (mirrors pipeline.yml)
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.10.0
      - continue-on-error: true
        name: Login to Docker Hub (avoids anonymous pull rate limits; mirrors pipeline.yml)
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          password: ${{ secrets.DOCKERHUB_TOKEN_READ }}
          username: ${{ secrets.DOCKERHUB_USERNAME_READ }}
      - continue-on-error: true
        name: Provision DB test stack (best effort, mirrors pipeline.yml test jobs)
        run: "set -euo pipefail\n# Overlap the two slow downloads with pnpm install (like pipeline.yml).\n# worker-tests profile adds floci (lambda endpoint for awsLambda tests).\n# HOST_IP=0.0.0.0: publish beyond host-loopback so the sandboxed agent\n# can reach the services through the AWF host gateway as well.\n(set +e; COMPOSE_PROFILES=worker-tests HOST_IP=0.0.0.0 docker compose -f docker-compose.dev.yml up -d --wait --wait-timeout 180 > /tmp/compose-up.log 2>&1; echo $? > /tmp/compose-up.exit) &\n(\n  set -e\n  curl --fail --location --retry 5 --retry-delay 2 --retry-all-errors \\\n    --output /tmp/migrate.linux-amd64.tar.gz \\\n    https://github.com/golang-migrate/migrate/releases/download/v4.19.1/migrate.linux-amd64.tar.gz\n  echo \"2ac648fbd1b127b69ab5a7b33cf96212178f71e22379fc50573630c6f4c7ce18  /tmp/migrate.linux-amd64.tar.gz\" | sha256sum -c -\n  tar xzf /tmp/migrate.linux-amd64.tar.gz -C /tmp\n  sudo mv /tmp/migrate /usr/bin/migrate\n) > /tmp/migrate-install.log 2>&1 &\nmigrate_pid=$!\npnpm install\n# tests-web \"Load default env\" recipe (default deploy mode), then\n# copies for worker-job parity (tests-worker reads worker/.env).\ngrep -v -e '^LANGFUSE_S3_BATCH_EXPORT_ENABLED=' -e '^NEXT_PUBLIC_LANGFUSE_RUN_NEXT_INIT=' .env.dev.example > .env\n{\n  echo \"LANGFUSE_INGESTION_QUEUE_DELAY_MS=1\"\n  echo \"LANGFUSE_CACHE_PROMPT_ENABLED=false\"\n  echo \"LANGFUSE_INGESTION_CLICKHOUSE_WRITE_INTERVAL_MS=1\"\n  echo \"LANGFUSE_TRACE_DELETE_DELAY_MS=1\"\n  echo \"LANGFUSE_TRACE_DELETE_CONCURRENCY=100\"\n  echo \"ADMIN_API_KEY=admin-api-key\"\n  echo \"LANGFUSE_EE_LICENSE_KEY=langfuse_ee_test\"\n  echo \"LANGFUSE_SKIP_EVALUATOR_MODEL_CALL_VALIDATION=true\"\n  echo \"LANGFUSE_ENABLE_SCORES_V3_API=true\"\n} >> .env\n# pipeline.yml passes this as a step env var; baked into the ROOT .env\n# (which worker/vitest.config.ts loads via ../.env — worker/.env is\n# never read by vitest) so the agent needs no env prefixes.\necho \"LANGFUSE_CODE_EVAL_AWS_LAMBDA_ENDPOINT=http://localhost:4566\" >> .env\ncp .env web/.env\ncp .env worker/.env\npnpm --filter=shared run db:generate\n# @langfuse/shared exports point at dist/ — web and worker vitest\n# import the BUILT package, so this build is load-bearing.\npnpm --filter=worker... run build\ntimeout 300 bash -c 'until [ -f /tmp/compose-up.exit ]; do sleep 1; done'\ncat /tmp/compose-up.log\n[ \"$(cat /tmp/compose-up.exit)\" = \"0\" ]\nwait \"$migrate_pid\"\npnpm run db:migrate\npnpm --filter=shared run db:seed\npnpm --filter=shared ch:up\n# ClickHouse client shim via the dev container (pipeline.yml trick,\n# avoids the ~300MB client download) for dev-tables setup.\nsudo tee /usr/local/bin/clickhouse > /dev/null <<'CLICKHOUSE_SHIM'\n#!/bin/bash\nexec docker exec -i langfuse-clickhouse clickhouse \"$@\"\nCLICKHOUSE_SHIM\nsudo chmod +x /usr/local/bin/clickhouse\npnpm --filter=shared ch:dev-tables\n# The sandbox reaches these services only via the host gateway\n# (host.docker.internal) — see the sandbox.agent.args comment. The\n# host-side steps above needed localhost, so rewrite the service\n# endpoints (port-scoped: app URLs like :3000 must stay localhost)\n# as the LAST provisioning action.\nsed -E -i 's#(localhost|127\\.0\\.0\\.1):(4566|5432|6379|8123|9000|9090)#host.docker.internal:\\2#g; s#^REDIS_HOST=.*#REDIS_HOST=\"host.docker.internal\"#' .env web/.env worker/.env\nmkdir -p /tmp/gh-aw && touch /tmp/gh-aw/db-stack-ready\n"
      - if: always()
        name: Docker logout (drop registry credentials before the agent starts)
        run: docker logout || true

      # Repo memory git-based storage configuration from frontmatter processed below
      - name: Clone repo-memory branch (default)
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          BRANCH_NAME: memory/ci-runtime-analysis
          TARGET_REPO: ${{ github.repository }}
          MEMORY_DIR: /tmp/gh-aw/repo-memory/default
          CREATE_ORPHAN: true
        run: bash "${RUNNER_TEMP}/gh-aw/actions/clone_repo_memory_branch.sh"
      - name: Configure Git credentials
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bash "${RUNNER_TEMP}/gh-aw/actions/configure_git_credentials.sh"
      - name: Checkout PR branch
        id: checkout-pr
        if: |
          github.event.pull_request || github.event.issue.pull_request || github.event_name == 'workflow_dispatch' && fromJSON(github.event.inputs.aw_context || '{}').item_type == 'pull_request'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GH_TOKEN: ${{ secrets.GH_AW_CI_ANALYST_TOKEN }}
        with:
          github-token: ${{ secrets.GH_AW_CI_ANALYST_TOKEN }}
          script: |
            const { setupGlobals } = require('${{ runner.temp }}/gh-aw/actions/setup_globals.cjs');
            setupGlobals(core, github, context, exec, io, getOctokit);
            const { main } = require('${{ runner.temp }}/gh-aw/actions/checkout_pr_branch.cjs');
            await main();
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          package-manager-cache: false
      - name: Install AWF binary
        run: bash "${RUNNER_TEMP}/gh-aw/actions/install_awf_binary.sh" v0.27.13
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code@2.1.195
      - name: Determine automatic lockdown mode for GitHub MCP Server
        id: determine-automatic-lockdown
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0 (source v9)
        env:
          GH_AW_GITHUB_TOKEN: ${{ secrets.GH_AW_GITHUB_TOKEN }}
          GH_AW_GITHUB_MCP_SERVER_TOKEN: ${{ secrets.GH_AW_GITHUB_MCP_SERVER_TOKEN }}
        with:
          script: |
            const determineAutomaticLockdown = require('${{ runner.temp }}/gh-aw/actions/determine_automatic_lockdown.cjs');
            await determineAutomaticLockdown(github, context, core);
      - name: Download activation artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: activation
          path: /tmp/gh-aw
      - name: Restore agent config folders from base branch
        if: steps.checkout-pr.outcome == 'success'
        env:
          GH_AW_AGENT_FOLDERS: ".agents .antigravity .claude .codex .crush .gemini .github .opencode .pi"
          GH_AW_AGENT_FILES: ".crush.json AGENTS.md ANTIGRAVITY.md CLAUDE.md GEMINI.md PI.md opencode.jsonc"
        run: bash "${RUNNER_TEMP}/gh-aw/actions/restore_base_github_folders.sh"
      - name: Restore inline sub-agents from activation artifact
        env:
          GH_AW_SUB_AGENT_DIR: ".claude/agents"
          GH_AW_SUB_AGENT_EXT: ".md"
        run: bash "${RUNNER_TEMP}/gh-aw/actions/restore_inline_sub_agents.sh"
      - name: Restore inline skills from activation artifact
        env:
          GH_AW_SKILL_DIR: ".claude/skills"
        run: bash "${RUNNER_TEMP}/gh-aw/actions/restore_inline_skills.sh"
      - name: Download container images
        run: bash "${RUNNER_TEMP}/gh-aw/actions/download_docker_images.sh" ghcr.io/github/gh-aw-firewall/agent:0.27.13@sha256:691a06b64961b5b35aac117eaace202fa721e91da19d1d2e22dcdd6663cd571b ghcr.io/github/gh-aw-firewall/api-proxy:0.27.13@sha256:c57febf4aeeefbb4fd96f5b12c07f4279ca55edca6a700032debf9dd0787286e ghcr.io/github/gh-aw-firewall/squid:0.27.13@sha256:700b1b5a73098373b04fb684f291e95d9be0124ab559717b04f27acaf8b41bed ghcr.io/github/gh-aw-mcpg:v0.3.32@sha256:63e46b56dfd70895a701b6fc6dd0189e11e2d875f327f1781e81b31848735477 ghcr.io/github/gh-aw-node@sha256:529d02eb970b1161aa25c593a9c3df57fdfad5a8add328cb3b6eccef66f3183b ghcr.io/github/github-mcp-server:v1.5.0@sha256:e25564dccc9110a70a77b9df560cbde11aa392fcb5f08b9abe5c4ebc6d146ea4
      - name: Generate Safe Outputs Config
        run: |
          mkdir -p "${RUNNER_TEMP}/gh-aw/safeoutputs"
          mkdir -p /tmp/gh-aw/safeoutputs
