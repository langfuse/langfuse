name: AWS preview build

# Build the PR's web + worker images and push them to ECR as pr-<n>-<sha>.
# The Argo CD ApplicationSet in the infrastructure repo deploys whichever image
# tag exists for a labeled PR; this workflow only builds and pushes, then posts
# the preview URL on the PR.
#
# Trust boundary is WRITE access: this builds a SAME-REPO PR's code with an AWS
# (ECR push) credential, and opening a same-repo PR requires push access — so
# only write-access members can trigger a build (applying the `preview` label is
# itself a write action). No per-author allowlist. Fork PRs are excluded (the
# head.repo check below) and can't mint an OIDC token anyway (public repo,
# read-only token) — and the ECR-push role's trust is scoped to
# sub=repo:langfuse/langfuse:pull_request AND ref=refs/pull/* (GitHub OIDC has no
# event_name claim), so pull_request_target / review — which carry the base
# branch ref — cannot assume it either.
on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions: {}

concurrency:
  group: preview-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push preview images
    # Any SAME-REPO PR (= write access) carrying the `preview` label builds.
    # Fork PRs are excluded (head.repo check) and can't mint OIDC anyway; there
    # is no per-author allowlist. AWS_PREVIEW_ECR_PUSH_ROLE_ARN doubles as the
    # feature flag: unset => the workflow no-ops instead of failing per PR.
    if: >-
      vars.AWS_PREVIEW_ECR_PUSH_ROLE_ARN != '' &&
      contains(github.event.pull_request.labels.*.name, 'preview') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout PR head (build context only)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Resolve image tags and preview metadata
        id: meta
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          WEB_REPO: ${{ vars.AWS_PREVIEW_WEB_ECR_REPOSITORY_URL }}
          WORKER_REPO: ${{ vars.AWS_PREVIEW_WORKER_ECR_REPOSITORY_URL }}
          DOMAIN_NAME: ${{ vars.AWS_PREVIEW_DOMAIN_NAME }}
        run: |
          set -euo pipefail
          commit_sha="$(git rev-parse HEAD)"
          short_sha="${commit_sha:0:12}"
          # The ApplicationSet deploys pr-<n>-{{.head_sha}} — Argo's FULL 40-char
          # SHA — so the pushed tag MUST use the full SHA or the deployed image
          # never resolves (permanent ImagePullBackOff). short_sha is display-only.
          image_tag="pr-${PR_NUMBER}-${commit_sha}"
          {
            echo "commit_sha=${commit_sha}"
            echo "image_tag=${image_tag}"
            echo "web_image=${WEB_REPO}:${image_tag}"
            echo "worker_image=${WORKER_REPO}:${image_tag}"
            echo "preview_host=pr-${PR_NUMBER}.${DOMAIN_NAME}"
            # Shared, intentionally-public seed login + API keys (synthetic data
            # only) — must match the LANGFUSE_INIT_* values in the preview chart
            # (k8s/preview/chart/values.yaml). Each preview is its own isolated
            # DB, so a shared seed identity is fine. The real crypto secrets
            # (ENCRYPTION_KEY/SALT/NEXTAUTH, DB passwords) are generated randomly
            # in-cluster by the chart's pre-sync hook and never leave the namespace.
            echo "login_email=preview@langfuse.local"
            echo "login_password=langfuse-preview"
            echo "public_key=pk-lf-preview"
            echo "secret_key=sk-lf-preview"
          } >> "$GITHUB_OUTPUT"

      - name: Mark preview building
        uses: ./.github/actions/preview-comment
        with:
          pr-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🟡 AWS preview building

            Building images for `${{ steps.meta.outputs.commit_sha }}` (~5 min).
            Argo CD deploys the preview once the push completes; it may briefly
            show `ImagePullBackOff` until this image propagates.

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          aws-region: ${{ vars.AWS_PREVIEW_REGION }}
          role-to-assume: ${{ vars.AWS_PREVIEW_ECR_PUSH_ROLE_ARN }}

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - name: Build and push preview images
        env:
          COMMIT_SHA: ${{ steps.meta.outputs.commit_sha }}
          WEB_IMAGE: ${{ steps.meta.outputs.web_image }}
          WORKER_IMAGE: ${{ steps.meta.outputs.worker_image }}
        run: |
          set -euo pipefail

          # The preview ECR repos are tag-IMMUTABLE, so re-pushing an existing
          # tag fails. Tags embed the commit SHA, so an existing tag is byte-for-
          # byte the same image — skip build+push if it is already there (this
          # makes workflow re-runs on an unchanged commit idempotent).
          image_present() {
            local image="$1" repo tag
            repo="${image%:*}"; repo="${repo##*/}"
            tag="${image##*:}"
            aws ecr describe-images --repository-name "${repo}" \
              --image-ids imageTag="${tag}" >/dev/null 2>&1
          }

          if image_present "${WEB_IMAGE}"; then
            echo "${WEB_IMAGE} already present — skipping."
          else
            docker build \
              --build-arg NEXT_PUBLIC_BUILD_ID="${COMMIT_SHA}" \
              --build-arg NEXT_PUBLIC_SIGN_UP_DISABLED=true \
              -f ./web/Dockerfile \
              -t "${WEB_IMAGE}" \
              .
            docker push "${WEB_IMAGE}"
          fi

          if image_present "${WORKER_IMAGE}"; then
            echo "${WORKER_IMAGE} already present — skipping."
          else
            docker build \
              --build-arg NEXT_PUBLIC_BUILD_ID="${COMMIT_SHA}" \
              -f ./worker/Dockerfile \
              -t "${WORKER_IMAGE}" \
              .
            docker push "${WORKER_IMAGE}"
          fi

      - name: Mark preview image pushed
        uses: ./.github/actions/preview-comment
        with:
          pr-number: ${{ github.event.pull_request.number }}
          body: |
            ### 🟢 AWS preview image pushed

            Argo CD is rolling it out — the environment is usually ready within a
            few minutes of this comment.

            **URL:** https://${{ steps.meta.outputs.preview_host }}
            **Login:** `${{ steps.meta.outputs.login_email }}` / `${{ steps.meta.outputs.login_password }}`
            **API keys:** `${{ steps.meta.outputs.public_key }}` / `${{ steps.meta.outputs.secret_key }}`
            **Commit:** ${{ steps.meta.outputs.commit_sha }}

            Synthetic preview data only — never enter a real credential. Remove
            the `preview` label or close the PR to destroy the environment.

      - name: Report failure
        if: failure()
        uses: ./.github/actions/preview-comment
        with:
          pr-number: ${{ github.event.pull_request.number }}
          body: |
            ### ⚠️ AWS preview build failed

            The image build/push failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
