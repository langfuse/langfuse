name: Claude Code Security Review

on:
  pull_request:
    types:
      - opened
      - ready_for_review
      - reopened
      - synchronize

permissions: {}

jobs:
  security-review:
    name: Claude Code Security Review
    # The upstream action is only intended for trusted PRs and exits early
    # outside pull_request events. synchronize makes it run for each new commit.
    if: github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Run Claude Code security review
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda # main, 2026-05-11
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          comment-pr: true
          run-every-commit: true
