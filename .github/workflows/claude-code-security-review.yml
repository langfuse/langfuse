name: Claude Code Security Review

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

jobs:
  security-review:
    name: Claude Code Security Review
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 2
          persist-credentials: false

      - name: Patch Claude API validation model
        shell: bash
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          runner_workspace = Path(os.environ["RUNNER_WORKSPACE"])
          action_root = (
              runner_workspace.parent
              / "_actions"
              / "anthropics"
              / "claude-code-security-review"
          )
          matches = list(action_root.glob("*/claudecode/claude_api_client.py"))
          if len(matches) != 1:
              raise SystemExit(f"Expected one Claude API client under {action_root}, found {len(matches)}")
          action_path = matches[0]
          source = action_path.read_text()
          old = 'model="claude-3-5-haiku-20241022",'
          new = "model=self.model,"
          if old not in source:
              raise SystemExit(f"Expected validation model not found in {action_path}")
          action_path.write_text(source.replace(old, new))
          PY

      - name: Run Claude Code security review
        uses: anthropics/claude-code-security-review@0c6a49f1fa56a1d472575da86a94dbc1edb78eda # main, 2026-05-11
        with:
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          claude-model: claude-opus-4-1-20250805
          comment-pr: true
          run-every-commit: true
