packages:
  # include packages in subfolders (e.g. apps/ and packages/)
  - "web"
  - "worker"
  - "packages/**"
  - "ee"
catalog:
  "@aws-sdk/client-cloudwatch": 3.1056.0
  "@aws-sdk/client-lambda": 3.1056.0
  "@aws-sdk/client-s3": 3.1056.0
  "@aws-sdk/client-sesv2": 3.1056.0
  "@aws-sdk/credential-providers": 3.1056.0
  "@aws-sdk/lib-storage": 3.1056.0
  "@aws-sdk/s3-request-presigner": 3.1056.0
  # The official TS 6 side-by-side wrapper (resolves to typescript 6.0.3):
  # provides the JS compiler API for typescript-eslint/next/tsx consumers but
  # ships no `tsc` bin, so package scripts fall through to the workspace-root
  # ts7 alias and build/typecheck with the native TypeScript 7 compiler.
  # web overrides this with real typescript@^7 for next build's CLI checker.
  typescript: npm:@typescript/typescript6@^6.0.2
# 5 day delay for new dep upgrades to reduce supply chain attack risk
minimumReleaseAge: 7200
# the exclusions are temporary so that we can set the 5 day limit without downgrading packages.
# this list is version-specific
minimumReleaseAgeExclude:
  - "@clickhouse/client@1.23.1"
  # TypeScript 7 GA (2026-07-08) + the 6.0 API wrapper (2026-07-06) are newer
  # than the 5-day window; platform binaries are exact-version companions of
  # typescript@7.0.2.
  - "typescript@7.0.2"
  - "@typescript/typescript6@6.0.2"
  - "@typescript/typescript-aix-ppc64@7.0.2"
  - "@typescript/typescript-darwin-arm64@7.0.2"
  - "@typescript/typescript-darwin-x64@7.0.2"
  - "@typescript/typescript-freebsd-arm64@7.0.2"
  - "@typescript/typescript-freebsd-x64@7.0.2"
  - "@typescript/typescript-linux-arm@7.0.2"
  - "@typescript/typescript-linux-arm64@7.0.2"
  - "@typescript/typescript-linux-loong64@7.0.2"
  - "@typescript/typescript-linux-mips64el@7.0.2"
  - "@typescript/typescript-linux-ppc64@7.0.2"
  - "@typescript/typescript-linux-riscv64@7.0.2"
  - "@typescript/typescript-linux-s390x@7.0.2"
  - "@typescript/typescript-linux-x64@7.0.2"
  - "@typescript/typescript-netbsd-arm64@7.0.2"
  - "@typescript/typescript-netbsd-x64@7.0.2"
  - "@typescript/typescript-openbsd-arm64@7.0.2"
  - "@typescript/typescript-openbsd-x64@7.0.2"
  - "@typescript/typescript-sunos-x64@7.0.2"
  - "@typescript/typescript-win32-arm64@7.0.2"
  - "@typescript/typescript-win32-x64@7.0.2"
  # next 16.3.0-preview.6 (2026-07-13) for experimental.useTypeScriptCli
  # (native TS 7 type-checking in next build); swc binaries are exact-version
  # companions.
  - "next@16.3.0-preview.6"
  - "@next/env@16.3.0-preview.6"
  - "@next/swc-darwin-arm64@16.3.0-preview.6"
  - "@next/swc-darwin-x64@16.3.0-preview.6"
  - "@next/swc-linux-arm64-gnu@16.3.0-preview.6"
  - "@next/swc-linux-arm64-musl@16.3.0-preview.6"
  - "@next/swc-linux-x64-gnu@16.3.0-preview.6"
  - "@next/swc-linux-x64-musl@16.3.0-preview.6"
  - "@next/swc-win32-arm64-msvc@16.3.0-preview.6"
  - "@next/swc-win32-x64-msvc@16.3.0-preview.6"
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  "@datadog/native-appsec": false
  "@datadog/native-iast-taint-tracking": false
  "@datadog/native-metrics": false
  core-js: false
  dd-trace: false
  msgpackr-extract: false
  msw: false
  prisma: false
  protobufjs: false
  "@datadog/pprof": false
  "@scarf/scarf": false
overrides:
  esbuild: "0.28.1"
  "undici@7": 7.28.0
  zod: 4.3.6
  nanoid: ^3.3.8
  katex: ^0.16.21
  tar-fs: ^2.1.2
  rollup@^4.0.0: ^4.22.4
  "@types/node-fetch": ^2.6.13
  "@types/react-dom": 19.2.3
  fast-xml-builder: 1.1.7
  glob: ^10.5.0
  qs: 6.15.2
  path-to-regexp@0.1.12: 0.1.13
  ip-address@10.1.0: 10.2.0
  "@ai-sdk/provider-utils@<=4.0.26": 4.0.27
  "@ai-sdk/provider-utils-v5": "npm:@ai-sdk/provider-utils@4.0.27"
  "@copilotkit/runtime@0.0.0-mme-ag-ui-0-0-46-20260227141603>@ag-ui/langgraph": 0.0.29
  # Keep Anthropic's Vertex client on an SDK version that emits Vertex rawPredict URLs.
  # Remove once @langchain/anthropic allows the same SDK range.
  # Check: https://www.npmjs.com/package/@langchain/anthropic?activeTab=dependencies
  "@anthropic-ai/vertex-sdk>@anthropic-ai/sdk": 0.104.1
  # next-auth 4.24.x caps its optional nodemailer peer at ^7 but contains no
  # nodemailer imports (we pass a custom sendVerificationRequest); without this
  # pnpm auto-installs a second, unused nodemailer@7 instance for web.
  # Remove once next-auth allows nodemailer ^8.
  "next-auth>nodemailer": "^8.0.11"
patchedDependencies:
  next-auth@4.24.14: patches/next-auth@4.24.14.patch
publicHoistPattern:
  - "*prisma*"
  - "@aws-sdk/client-s3"
