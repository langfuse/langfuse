packages:
  # include packages in subfolders (e.g. apps/ and packages/)
  - "web"
  - "worker"
  - "packages/**"
  - "ee"
# 5 day delay for new dep upgrades to reduce supply chain attack risk
minimumReleaseAge: 7200
# TODO: remove exclusions below!
# the exclusions are temporary so that we can set the 5 day limit without downgrading packages.
# this list is version-specific
minimumReleaseAgeExclude:
  - "eslint-config-turbo@2.9.5"
  - "eslint-plugin-turbo@2.9.5"
  - "turbo@2.9.5"
  - "@turbo/darwin-64@2.9.5"
  - "@turbo/darwin-arm64@2.9.5"
  - "@turbo/windows-64@2.9.5"
  - "@turbo/windows-arm64@2.9.5"
  - "@turbo/linux-64@2.9.5"
  - "@turbo/linux-arm64@2.9.5"
  - "vitest@4.1.4"
  - "@vitest/mocker@4.1.4"
  - "@vitest/pretty-format@4.1.4"
  - "@vitest/snapshot@4.1.4"
  - "@vitest/spy@4.1.4"
  - "@vitest/runner@4.1.4"
  - "@vitest/expect@4.1.4"
  - "@vitest/utils@4.1.4"
  - "@vitest/coverage-v8@4.1.4"
  - "axios@1.15.0"
  - "next@16.2.3"
  - "@next/env@16.2.3"
  - "eslint-config-next@16.2.3"
  - "@next/eslint-plugin-next@16.2.3"
  - "@next/swc-darwin-arm64@16.2.3"
  - "@next/swc-darwin-x64@16.2.3"
  - "@next/swc-linux-arm64-gnu@16.2.3"
  - "@next/swc-linux-arm64-musl@16.2.3"
  - "@next/swc-linux-x64-gnu@16.2.3"
  - "@next/swc-linux-x64-musl@16.2.3"
  - "@next/swc-win32-arm64-msvc@16.2.3"
  - "@next/swc-win32-x64-msvc@16.2.3"
  - "defu@6.1.7"
  - "hono@4.12.12"
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  "@datadog/native-appsec": false
  "@datadog/native-iast-taint-tracking": false
  "@datadog/native-metrics": false
  core-js: false
  dd-trace: false
  msgpackr-extract: false
  msw: false
  prisma: false
  protobufjs: false
