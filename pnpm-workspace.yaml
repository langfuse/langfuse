packages:
  # include packages in subfolders (e.g. apps/ and packages/)
  - "web"
  - "worker"
  - "packages/**"
  - "ee"
# 5 day delay for new dep upgrades to reduce supply chain attack risk
minimumReleaseAge: 7200
# TODO: remove exclusions below!
# the exclusions are temporary so that we can set the 5 day limit without downgrading packages.
# this list is version-specific
minimumReleaseAgeExclude:
  - "@ungap/structured-clone@1.3.1"
  - "next@16.2.6"
  - "@next/env@16.2.6"
  - "@next/swc-darwin-arm64@16.2.6"
  - "@next/swc-darwin-x64@16.2.6"
  - "@next/swc-linux-arm64-gnu@16.2.6"
  - "@next/swc-linux-arm64-musl@16.2.6"
  - "@next/swc-linux-x64-gnu@16.2.6"
  - "@next/swc-linux-x64-musl@16.2.6"
  - "@next/swc-win32-arm64-msvc@16.2.6"
  - "@next/swc-win32-x64-msvc@16.2.6"
  - "eslint-config-next@16.2.6"
  - "@next/eslint-plugin-next@16.2.6"
  - "fast-xml-builder@1.1.7"
  - "fast-uri@3.1.2"
allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  "@sentry/cli": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  "@datadog/native-appsec": false
  "@datadog/native-iast-taint-tracking": false
  "@datadog/native-metrics": false
  core-js: false
  dd-trace: false
  msgpackr-extract: false
  msw: false
  prisma: false
  protobufjs: false
  '@datadog/pprof': false
overrides:
  zod: 4.3.6
  nanoid: ^3.3.8
  katex: ^0.16.21
  tar-fs: ^2.1.2
  rollup@^4.0.0: ^4.22.4
  '@types/node-fetch': ^2.6.13
  '@types/react-dom': 19.2.3
  fast-xml-builder: 1.1.7
  glob: ^10.5.0
  qs: 6.14.1
  path-to-regexp@0.1.12: 0.1.13
  ip-address@10.1.0: 10.2.0
patchedDependencies:
  next-auth@4.24.13: patches/next-auth@4.24.13.patch
publicHoistPattern:
  - '*prisma*'
  - '@aws-sdk/client-s3'
